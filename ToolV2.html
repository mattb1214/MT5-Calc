<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 61 - Single Tile</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 600px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.9em; margin: 10px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); color: #e2e8f0; }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; box-sizing: border-box; }
        .export-btn { margin-top: 20px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 600px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Engine 61</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:60px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:60px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:60px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export 23-Column Forensic CSV</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            // Rendered with a single tile (index 0) stripped of sequence inputs
            grid.innerHTML = `
                <div class="card">
                    <input type="text" placeholder="Ticker" id="t-0">
                    <select id="m-0" onchange="calc(0)"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-0" oninput="calc(0)"><input type="number" placeholder="ATR" id="a-0" oninput="calc(0)"></div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-0" oninput="calc(0)"><input type="number" placeholder="15m Low" id="l-0" oninput="calc(0)"></div>
                    <div class="output" id="res-0">Calculations...</div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="IntraHigh" id="ih-0"><input type="number" placeholder="IntraLow" id="il-0"><input type="number" placeholder="Flatten" id="ex-0"></div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="Actual P/L" id="pl-0"><input type="number" placeholder="Max Price" id="mp-0"></div>
                    <select id="exit-type-0"><option value="Normal">Normal</option><option value="BE">BE</option><option value="Stopped">Stopped</option></select>
                    <textarea placeholder="Trade Notes" id="n1-0"></textarea>
                </div>
            `;
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const brokerage = document.getElementById(`m-${i}`).value;
            const r = parseFloat(document.getElementById('gRisk').value)/100;
            
            if(!b || !a || !h || !l) return;
            
            const e = h + (h * 0.001) + (a * 0.05);
            const sl = l - (a * 0.1);
            const stopDist = e - sl;
            
            const total = (brokerage === "ETRADE") ? Math.floor((b * r) / stopDist) : parseFloat(((b * r) / stopDist).toFixed(2));
            const unitLabel = (brokerage === "MT5") ? "Lots" : "Shares";
            const body = (brokerage === "ETRADE") ? Math.floor(total / 3) : (total / 3).toFixed(2);
            const runner = (brokerage === "ETRADE") ? (total - body) : (total - parseFloat(body)).toFixed(2);
            
            const sat = ((h - l) / a) * 100;
            const status = (sat >= parseFloat(document.getElementById('gMin').value) && sat <= parseFloat(document.getElementById('gMax').value)) ? "APPROVED" : "DISQUALIFIED";

            document.getElementById(`res-${i}`).innerHTML = `<b class="${status === 'APPROVED' ? 'approved' : 'disqualified'}">${status} (${sat.toFixed(1)}%)</b><br>
            Total: ${total} ${unitLabel} | Body: ${body} | Runner: ${runner}<br>
            E: ${e.toFixed(2)} | SL: ${sl.toFixed(2)}<br>
            TP1: ${(e+stopDist).toFixed(2)} | TP2: ${(e+stopDist*2).toFixed(2)} | TP3: ${(e+stopDist*3).toFixed(2)}`;
        }

        function exportCSV() {
            let csv = "Date,Status,Brokerage,Ticker,Balance,Risk%,ATR,15mHigh,15mLow,VolRatio%,Entry,SL,TP1,TP2,TP3,IntraHigh,IntraLow,Flatten,MaxPrice,ActualPL,Efficiency%,GainLoss%,TradeNotes\n";
            // Loop runs for the single active tile (index 0)
            for(let i=0; i<1; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const r = parseFloat(document.getElementById('gRisk').value)/100;
                const brokerage = document.getElementById(`m-${i}`).value;
                const e = h + (h * 0.001) + (a * 0.05);
                const sl = l - (a * 0.1);
                const stopDist = e - sl;
                const totalUnits = (brokerage === "ETRADE") ? Math.floor((b * r) / stopDist) : parseFloat(((b * r) / stopDist).toFixed(2));
                
                const ih = document.getElementById(`ih-${i}`).value || 0;
                const il = document.getElementById(`il-${i}`).value || 0;
                const pl = document.getElementById(`pl-${i}`).value || 0;
                const flatP = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const maxP = parseFloat(document.getElementById(`mp-${i}`).value) || 0;
                const status = ( ((h-l)/a)*100 >= parseFloat(document.getElementById('gMin').value) && ((h-l)/a)*100 <= parseFloat(document.getElementById('gMax').value) ) ? "APPROVED" : "DISQUALIFIED";
                
                const eff = (maxP > e && flatP > e) ? (((flatP - e) / (maxP - e)) * 100).toFixed(2) : "N/A";
                const gl = (flatP === 0) ? "0%" : (((flatP - e) * totalUnits) / b * 100).toFixed(2) + "%";

                csv += `${new Date().toLocaleDateString()},${status},${brokerage},${document.getElementById(`t-${i}`).value},${b},${(r*100).toFixed(2)}%,${a},${h},${l},${(((h-l)/a)*100).toFixed(2)}%,${e.toFixed(2)},${sl.toFixed(2)},${(e+stopDist).toFixed(2)},${(e+stopDist*2).toFixed(2)},${(e+stopDist*3).toFixed(2)},${ih},${il},${flatP},${maxP},${pl},${eff}%,${gl},"${document.getElementById(`n1-${i}`).value}"\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Forensic_Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
