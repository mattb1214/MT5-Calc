<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 61 - Single Tile</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 600px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .dashboard { background: #020617; padding: 10px; border-radius: 6px; border: 1px solid #475569; margin-bottom: 12px; display: flex; gap: 10px; font-size: 0.9em; align-items: center; }
        .output { font-family: monospace; font-size: 0.9em; margin: 10px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); color: #e2e8f0; }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; box-sizing: border-box; }
        .dashboard input { width: 50px; padding: 3px; font-size: 0.9em; }
        .export-btn { margin-top: 20px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 600px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Engine 61</h2>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export 23-Column Forensic CSV</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = `
                <div class="card">
                    <div class="dashboard">
                        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" oninput="calc(0)">
                        Min Sat: <input type="number" id="gMin" value="32.5" oninput="calc(0)">
                        Max Sat: <input type="number" id="gMax" value="52.5" oninput="calc(0)">
                    </div>
                    <input type="text" placeholder="Ticker" id="t-0" value="US30">
                    <select id="m-0" onchange="calc(0)"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-0" value="196328" oninput="calc(0)"><input type="number" placeholder="ATR" id="a-0" value="533" oninput="calc(0)"></div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-0" value="52125" oninput="calc(0)"><input type="number" placeholder="15m Low" id="l-0" value="51916" oninput="calc(0)"></div>
                    
                    <!-- Top Result Screen: Strictly based off base calculations -->
                    <div class="output" id="res-0">Calculations...</div>
                    
                    <!-- Entry & Exit Condition Dropdowns -->
                    <div style="display:flex; gap:5px;">
                        <select id="entry-cond-0" onchange="calc(0)">
                            <option value="Entry price not hit">Entry price not hit</option>
                            <option value="Shadow entry hit">Shadow entry hit</option>
                            <option value="Both entry prices hit">Both entry prices hit</option>
                        </select>
                        <select id="exit-cond-0" onchange="calc(0)">
                            <option value="Stopped out">Stopped out</option>
                            <option value="TP not hit, flattened" selected>TP not hit, flattened</option>
                            <option value="TP hit, stopped out">TP hit, stopped out</option>
                            <option value="TP hit, flattened">TP hit, flattened</option>
                        </select>
                    </div>

                    <!-- Entry & Shadow Entry Timestamp Rows -->
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Entry Price Hit" id="entry-price-0" style="flex:2;" value="52203" oninput="calc(0)">
                        <input type="text" placeholder="Time (e.g. 09:35)" id="entry-time-0" style="flex:1;" value="9:00">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Shadow Entry Hit" id="shadow-price-0" style="flex:2;" value="52118" oninput="calc(0)">
                        <input type="text" placeholder="Time (e.g. 09:45)" id="shadow-time-0" style="flex:1;" value="8:55">
                    </div>

                    <!-- Price & Timestamp Input Rows -->
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intraday High" id="ih-0" style="flex:2;" value="52417" oninput="calc(0)">
                        <input type="text" placeholder="Time (e.g. 10:30)" id="ih-time-0" style="flex:1;" value="11:45">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intraday Low" id="il-0" style="flex:2;" value="52109" oninput="calc(0)">
                        <input type="text" placeholder="Time (e.g. 11:15)" id="il-time-0" style="flex:1;" value="9:30">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intra Trade High" id="ith-0" style="flex:2;" value="52417" oninput="calc(0)">
                        <input type="text" placeholder="Time (e.g. 13:45)" id="ith-time-0" style="flex:1;" value="11:45">
                    </div>
                    <div>
                        <input type="number" placeholder="Flattened Price" id="ex-0" value="52280" oninput="calc(0)">
                    </div>

                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="number" placeholder="Offset % (e.g. 25)" id="off-0" value="25" oninput="calc(0)">
                        <input type="text" placeholder="Custom Entry Value" id="off-res-0" readonly style="background:#1e293b; color:#94a3b8;">
                    </div>
                    
                    <!-- P&L / Trade Simulation Output Box (% of Account) -->
                    <div class="output" id="pnl-res-0" style="border-left-color: #38bdf8; margin-top: 5px;">Trade P&L Simulation: Awaiting criteria inputs...</div>

                    <!-- Bottom Result Screen: Displays new lot sizing based on offset percentage -->
                    <div class="output" id="off-metrics-0" style="border-left-color: #22c55e; margin-top: 5px;">Custom Entry Adjustments: Enter Offset %</div>
                    <textarea placeholder="Trade Notes" id="n1-0">Hit entry, did not hit tp1, flattened for small gain</textarea>
                </div>
            `;
            calc(0);
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const brokerage = document.getElementById(`m-${i}`).value;
            const r = parseFloat(document.getElementById('gRisk').value)/100;
            
            if(!b || !a || !h || !l) return;
            
            // 1. Base Calculations for the Top Result Box
            const baseE = h + (h * 0.001) + (a * 0.05);
            const sl = l - (a * 0.1);
            const stopDistBase = baseE - sl;
            
            if (stopDistBase <= 0) return;

            const totalBase = (brokerage === "ETRADE") ? Math.floor((b * r) / stopDistBase) : parseFloat(((b * r) / stopDistBase).toFixed(2));
            const unitLabel = (brokerage === "MT5") ? "Lots" : "Shares";
            
            const bodyBase = (brokerage === "ETRADE") ? Math.floor(totalBase / 3) : parseFloat((totalBase / 3).toFixed(2));
            const runnerBase = (brokerage === "ETRADE") ? (totalBase - bodyBase) : parseFloat((totalBase - bodyBase).toFixed(2));
            
            const sat = ((h - l) / a) * 100;
            const status = (sat >= parseFloat(document.getElementById('gMin').value) && sat <= parseFloat(document.getElementById('gMax').value)) ? "APPROVED" : "DISQUALIFIED";

            // Render Top Result Box strictly using base metrics
            document.getElementById(`res-${i}`).innerHTML = `<b class="${status === 'APPROVED' ? 'approved' : 'disqualified'}">${status} (${sat.toFixed(1)}%)</b><br>
            Total: ${totalBase} ${unitLabel} | Body (1/3): ${bodyBase} | Runner (2/3): ${runnerBase}<br>
            E: ${baseE.toFixed(2)} | SL: ${sl.toFixed(2)}<br>
            TP1 (Body Target): ${(baseE+stopDistBase).toFixed(2)} | TP2: ${(baseE+stopDistBase*2).toFixed(2)} | TP3: ${(baseE+stopDistBase*3).toFixed(2)}`;

            // 2. Offset Calculations for the Bottom Result Box
            const offsetInput = parseFloat(document.getElementById(`off-${i}`).value);
            let activeE = baseE;
            
            if (!isNaN(offsetInput)) {
                activeE = baseE - (stopDistBase * (offsetInput / 100));
                document.getElementById(`off-res-0`).value = activeE.toFixed(2);

                const customStopDist = activeE - sl;
                if (customStopDist > 0) {
                    const adjTotal = (brokerage === "ETRADE") ? Math.floor((b * r) / customStopDist) : parseFloat(((b * r) / customStopDist).toFixed(2));
                    const adjBody = (brokerage === "ETRADE") ? Math.floor(adjTotal / 3) : parseFloat((adjTotal / 3).toFixed(2));
                    const adjRunner = (brokerage === "ETRADE") ? (adjTotal - adjBody) : parseFloat((adjTotal - adjBody).toFixed(2));

                    document.getElementById(`off-metrics-0`).innerHTML = `<b>Custom Entry Adjustments (New Lot Sizing):</b><br>
                    New Entry: ${activeE.toFixed(2)} | Adj Total: ${adjTotal} ${unitLabel}<br>
                    Adj Body (1/3): ${adjBody} | Adj Runner (2/3): ${adjRunner}`;
                } else {
                    document.getElementById(`off-metrics-0`).innerHTML = `<span style="color:#ef4444;">Error: Custom entry must remain above stop loss.</span>`;
                }
            } else {
                document.getElementById(`off-res-0`).value = "";
                document.getElementById(`off-metrics-0`).innerHTML = `Custom Entry Adjustments: Enter Offset %`;
            }

            // 3. Trade P&L Simulation (% of Account)
            const entryCond = document.getElementById(`entry-cond-${i}`).value;
            const exitCond = document.getElementById(`exit-cond-${i}`).value;
            const flatPrice = parseFloat(document.getElementById(`ex-${i}`).value) || activeE;

            let regularPLDollars = 0;
            let executionDesc = "";

            if (entryCond === "Entry price not hit") {
                regularPLDollars = 0;
                executionDesc = "No primary entry triggered.";
            } else {
                const tp1Target = activeE + customStopDist; 

                if (exitCond === "Stopped out") {
                    regularPLDollars = adjTotal * (sl - activeE);
                    executionDesc = `Full position stopped out at initial SL (${sl.toFixed(2)}).`;
                } 
                else if (exitCond === "TP not hit, flattened") {
                    regularPLDollars = adjTotal * (flatPrice - activeE);
                    executionDesc = `Flattened prior to TP at ${flatPrice.toFixed(2)}.`;
                } 
                else if (exitCond === "TP hit, stopped out") {
                    const bodyPL = adjBody * (tp1Target - activeE);
                    const runnerPL = adjRunner * (activeE - activeE); 
                    regularPLDollars = bodyPL + runnerPL;
                    executionDesc = `Body hit TP1 (${tp1Target.toFixed(2)}). Runner stopped out at Breakeven/Entry (${activeE.toFixed(2)}).`;
                } 
                else if (exitCond === "TP hit, flattened") {
                    const bodyPL = adjBody * (tp1Target - activeE);
                    const runnerPL = adjRunner * (flatPrice - activeE);
                    regularPLDollars = bodyPL + runnerPL;
                    executionDesc = `Body hit TP1 (${tp1Target.toFixed(2)}). Runner flattened at ${flatPrice.toFixed(2)}.`;
                }
            }

            const regularPLPercent = (regularPLDollars / b) * 100;

            document.getElementById(`pnl-res-0`).innerHTML = `<b>Trade P&L Simulation (% of Account):</b><br>
            Account Return: <span style="color: ${regularPLPercent >= 0 ? '#22c55e' : '#ef4444'}; font-weight: bold;">${regularPLPercent >= 0 ? '+' : ''}${regularPLPercent.toFixed(3)}%</span><br>
            <span style="font-size: 0.9em; color: #94a3b8;">${executionDesc}</span>`;
        }

        function exportCSV() {
            let csv = "Date,Status,Brokerage,Ticker,Balance,Risk%,ATR,15mHigh,15mLow,VolRatio%,Entry,SL,TP1,TP2,TP3,IntraHigh,IntraLow,Flatten,MaxPrice,ActualPL,Efficiency%,GainLoss%,TradeNotes\n";
            for(let i=0; i<1; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const r = parseFloat(document.getElementById('gRisk').value)/100;
                const brokerage = document.getElementById(`m-${i}`).value;
                const e = h + (h * 0.001) + (a * 0.05);
                const sl = l - (a * 0.1);
                const stopDist = e - sl;
                
                const ih = document.getElementById(`ih-${i}`).value || 0;
                const il = document.getElementById(`il-${i}`).value || 0;
                const flatP = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const maxP = parseFloat(document.getElementById(`ith-${i}`).value) || 0;
                const status = ( ((h-l)/a)*100 >= parseFloat(document.getElementById('gMin').value) && ((h-l)/a)*100 <= parseFloat(document.getElementById('gMax').value) ) ? "APPROVED" : "DISQUALIFIED";
                
                csv += `${new Date().toLocaleDateString()},${status},${brokerage},${document.getElementById(`t-${i}`).value},${b},${(r*100).toFixed(2)}%,${a},${h},${l},${(((h-l)/a)*100).toFixed(2)}%,${e.toFixed(2)},${sl.toFixed(2)},${(e+stopDist).toFixed(2)},${(e+stopDist*2).toFixed(2)},${(e+stopDist*3).toFixed(2)},${ih},${il},${flatP},${maxP},0,N/A,0%,"${document.getElementById(`n1-${i}`).value}"\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Forensic_Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
