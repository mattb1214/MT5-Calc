<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 61</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .dashboard { background: #020617; padding: 10px; border-radius: 6px; border: 1px solid #475569; margin-bottom: 12px; display: flex; gap: 10px; font-size: 0.9em; align-items: center; }
        .output { font-family: monospace; font-size: 0.85em; margin: 8px 0; background: #020617; padding: 10px; border-left: 4px solid var(--accent); color: #e2e8f0; }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; box-sizing: border-box; font-size: 0.9em; }
        
        /* Remove spinner arrows */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .dashboard input { width: 50px; padding: 3px; font-size: 0.9em; }
        .export-btn { margin: 30px auto; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 400px; font-weight: bold; display: block; font-size: 1.1em; }
        h2 { text-align: center; color: #f8fafc; margin-bottom: 25px; }
    </style>
</head>
<body>
    <h2>Engine 61</h2>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Comprehensive Forensic CSV (All Tiles)</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            let html = '';
            for(let i = 0; i < 8; i++) {
                html += `
                <div class="card">
                    <div class="dashboard">
                        Risk%: <input type="number" id="gRisk-${i}" value="0.75" step="0.05" oninput="calc(${i})">
                        Min Sat: <input type="number" id="gMin-${i}" value="32.5" oninput="calc(${i})">
                        Max Sat: <input type="number" id="gMax-${i}" value="52.5" oninput="calc(${i})">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" placeholder="Ticker" id="t-${i}" value="" oninput="calc(${i})">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                    </div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" value="" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" value="" oninput="calc(${i})"></div>
                    <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-${i}" value="" oninput="calc(${i})"><input type="number" placeholder="15m Low" id="l-${i}" value="" oninput="calc(${i})"></div>
                    
                    <div class="output" id="res-${i}">Calculations...</div>
                    
                    <div style="display:flex; gap:5px;">
                        <select id="entry-cond-${i}" onchange="calc(${i})">
                            <option value="Entry price not hit" selected>Entry price not hit</option>
                            <option value="Only regular entry price is hit">Only regular entry price is hit</option>
                            <option value="Shadow entry hit">Shadow entry hit</option>
                            <option value="Both entry prices hit">Both entry prices hit</option>
                        </select>
                        <select id="exit-cond-${i}" onchange="calc(${i})">
                            <option value="No trade" selected>No trade</option>
                            <option value="Stopped out">Stopped out</option>
                            <option value="TP not hit, flattened">TP not hit, flattened</option>
                            <option value="TP hit, stopped out">TP hit, stopped out</option>
                            <option value="TP hit, flattened">TP hit, flattened</option>
                        </select>
                    </div>

                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Entry Price Hit" id="entry-price-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="entry-time-${i}" style="flex:1;" value="">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Shadow Entry Hit" id="shadow-price-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="shadow-time-${i}" style="flex:1;" value="">
                    </div>

                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intraday High" id="ih-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="ih-time-${i}" style="flex:1;" value="">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intraday Low" id="il-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="il-time-${i}" style="flex:1;" value="">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intra Trade High" id="ith-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="ith-time-${i}" style="flex:1;" value="">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Intra Trade Low" id="itl-${i}" style="flex:2;" value="" oninput="calc(${i})">
                        <input type="time" placeholder="Time" id="itl-time-${i}" style="flex:1;" value="">
                    </div>
                    <div>
                        <input type="number" placeholder="Flattened Price" id="ex-${i}" value="" oninput="calc(${i})">
                    </div>

                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="number" placeholder="Entry Offset % (e.g. 35)" id="off-${i}" value="35" oninput="calc(${i})">
                        <input type="text" placeholder="Custom Entry Value" id="off-res-${i}" readonly style="background:#1e293b; color:#94a3b8;">
                    </div>
                    <div style="display:flex; gap:5px; margin-top:2px;">
                        <input type="number" placeholder="TP Offset % (e.g. 25)" id="tp-off-${i}" value="25" oninput="calc(${i})">
                        <input type="text" placeholder="Custom TP Value" id="tp-off-res-${i}" readonly style="background:#1e293b; color:#94a3b8;">
                    </div>
                    
                    <div class="output" id="pnl-res-${i}" style="border-left-color: #38bdf8; margin-top: 5px;">Trade P&L Simulation...</div>
                    <div class="output" id="off-metrics-${i}" style="border-left-color: #22c55e; margin-top: 5px;">Custom Entry Adjustments...</div>
                    <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                </div>`;
            }
            grid.innerHTML = html;
            for(let i = 0; i < 8; i++) { calc(i); }
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const brokerage = document.getElementById(`m-${i}`).value;
            const ticker = (document.getElementById(`t-${i}`).value || "").trim().toUpperCase();
            const riskInput = document.getElementById(`gRisk-${i}`).value;
            const r = riskInput === "" ? 0 : parseFloat(riskInput)/100;
            
            if(!b || !a || !h || !l || riskInput === "") {
                document.getElementById(`res-${i}`).innerHTML = `Calculations...`;
                document.getElementById(`pnl-res-${i}`).innerHTML = `Trade P&L Simulation...`;
                document.getElementById(`off-metrics-${i}`).innerHTML = `Custom Entry Adjustments...`;
                return;
            }
            
            const baseE = h + (h * 0.001) + (a * 0.05);
            const sl = l - (a * 0.1);
            const stopDistBase = baseE - sl;
            
            if (stopDistBase <= 0) return;

            const maxAllowedRiskDollars = b * r;
            
            let contractMultiplier = 1;
            if (brokerage === "MT5" && (ticker.includes("XUSD") || ticker.includes("XAU"))) {
                contractMultiplier = 100;
            }

            const effectiveStopDistBase = stopDistBase * contractMultiplier;
            const totalBase = (brokerage === "ETRADE") ? Math.floor(maxAllowedRiskDollars / effectiveStopDistBase) : parseFloat((maxAllowedRiskDollars / effectiveStopDistBase).toFixed(2));
            const unitLabel = (brokerage === "MT5") ? "Lots" : "Shares";
            
            const bodyBase = (brokerage === "ETRADE") ? Math.floor(totalBase / 3) : parseFloat((totalBase / 3).toFixed(2));
            const runnerBase = (brokerage === "ETRADE") ? (totalBase - bodyBase) : parseFloat((totalBase - bodyBase).toFixed(2));
            
            const sat = ((h - l) / a) * 100;
            const minSatVal = parseFloat(document.getElementById(`gMin-${i}`).value);
            const maxSatVal = parseFloat(document.getElementById(`gMax-${i}`).value);
            const minValid = !isNaN(minSatVal) && document.getElementById(`gMin-${i}`).value !== "";
            const maxValid = !isNaN(maxSatVal) && document.getElementById(`gMax-${i}`).value !== "";
            
            let status = "DISQUALIFIED";
            if (minValid && maxValid) {
                if (sat >= minSatVal && sat <= maxSatVal) status = "APPROVED";
            } else if (minValid) {
                if (sat >= minSatVal) status = "APPROVED";
            } else if (maxValid) {
                if (sat <= maxSatVal) status = "APPROVED";
            }

            document.getElementById(`res-${i}`).innerHTML = `<b class="${status === 'APPROVED' ? 'approved' : 'disqualified'}">${status} (${sat.toFixed(1)}%)</b><br>
            Total: ${totalBase} ${unitLabel} | Body (1/3): ${bodyBase} | Runner (2/3): ${runnerBase}<br>
            E: ${baseE.toFixed(2)} | SL: ${sl.toFixed(2)}<br>
            TP (Body Target): ${(baseE+stopDistBase).toFixed(2)}`;

            const entryCond = document.getElementById(`entry-cond-${i}`).value;
            const exitCond = document.getElementById(`exit-cond-${i}`).value;
            const flatPrice = parseFloat(document.getElementById(`ex-${i}`).value) || baseE;
            const tpTargetBase = baseE + stopDistBase;

            let regularPLDollars = 0;
            let regExecutionDesc = "";
            let regFullTPDollars = 0;
            let regInvertedRunnerDollars = 0;

            if (entryCond === "Entry price not hit" || exitCond === "No trade" || entryCond === "Shadow entry hit") {
                regularPLDollars = 0;
                regFullTPDollars = 0;
                regInvertedRunnerDollars = 0;
                regExecutionDesc = entryCond === "Shadow entry hit" ? "Regular entry not hit (Shadow entry active only)." : "No trade executed; zero P&L impact.";
            } else {
                if (exitCond === "Stopped out") {
                    regularPLDollars = totalBase * contractMultiplier * (sl - baseE);
                    regFullTPDollars = totalBase * contractMultiplier * (sl - baseE);
                    regInvertedRunnerDollars = totalBase * contractMultiplier * (sl - baseE);
                    regExecutionDesc = `Full position stopped out at initial SL (${sl.toFixed(2)}).`;
                } 
                else if (exitCond === "TP not hit, flattened") {
                    regularPLDollars = totalBase * contractMultiplier * (flatPrice - baseE);
                    regFullTPDollars = totalBase * contractMultiplier * (flatPrice - baseE);
                    regInvertedRunnerDollars = totalBase * contractMultiplier * (flatPrice - baseE);
                    regExecutionDesc = `Flattened prior to TP at ${flatPrice.toFixed(2)}.`;
                } 
                else if (exitCond === "TP hit, stopped out") {
                    regularPLDollars = (bodyBase * contractMultiplier * (tpTargetBase - baseE)) + (runnerBase * contractMultiplier * (baseE - baseE));
                    regFullTPDollars = totalBase * contractMultiplier * (tpTargetBase - baseE);
                    regInvertedRunnerDollars = (bodyBase * contractMultiplier * (baseE - baseE)) + (runnerBase * contractMultiplier * (tpTargetBase - baseE));
                    regExecutionDesc = `Body hit TP (${tpTargetBase.toFixed(2)}). Runner stopped out at Breakeven.`;
                } 
                else if (exitCond === "TP hit, flattened") {
                    regularPLDollars = (bodyBase * contractMultiplier * (tpTargetBase - baseE)) + (runnerBase * contractMultiplier * (flatPrice - baseE));
                    regFullTPDollars = totalBase * contractMultiplier * (tpTargetBase - baseE);
                    regInvertedRunnerDollars = (bodyBase * contractMultiplier * (flatPrice - baseE)) + (runnerBase * contractMultiplier * (tpTargetBase - baseE));
                    regExecutionDesc = `Body hit TP (${tpTargetBase.toFixed(2)}). Runner flattened at ${flatPrice.toFixed(2)}.`;
                }
            }

            const regularPLPercent = (regularPLDollars / b) * 100;
            const regColor = regularPLDollars >= 0 ? '#22c55e' : '#ef4444';
            const regSign = regularPLDollars >= 0 ? '+' : '';

            const regFullPct = (regFullTPDollars / b) * 100;
            const regFullColor = regFullTPDollars >= 0 ? '#22c55e' : '#ef4444';
            const regFullSign = regFullTPDollars >= 0 ? '+' : '';

            const regInvPct = (regInvertedRunnerDollars / b) * 100;
            const regInvColor = regInvertedRunnerDollars >= 0 ? '#22c55e' : '#ef4444';
            const regInvSign = regInvertedRunnerDollars >= 0 ? '+' : '';

            document.getElementById(`pnl-res-${i}`).innerHTML = `<b>Regular Trade P&L Simulation:</b><br>
            Standard Split: <span style="color: ${regColor}; font-weight: bold;">${regSign}${regularPLPercent.toFixed(3)}% (${regSign}$${regularPLDollars.toFixed(2)})</span><br>
            Full Position Sold at TP: <span style="color: ${regFullColor}; font-weight: bold;">${regFullSign}${regFullPct.toFixed(3)}% (${regFullSign}$${regFullTPDollars.toFixed(2)})</span><br>
            1/3 Runner Split: <span style="color: ${regInvColor}; font-weight: bold;">${regInvSign}${regInvPct.toFixed(3)}% (${regInvSign}$${regInvertedRunnerDollars.toFixed(2)})</span><br>
            <span style="font-size: 0.85em; color: #94a3b8;">${regExecutionDesc}</span>`;

            const offsetInput = parseFloat(document.getElementById(`off-${i}`).value);
            const tpOffsetInput = parseFloat(document.getElementById(`tp-off-${i}`).value);

            let activeE = baseE;
            
            if (!isNaN(offsetInput) && document.getElementById(`off-${i}`).value !== "") {
                activeE = baseE - (stopDistBase * (offsetInput / 100));
                document.getElementById(`off-res-${i}`).value = activeE.toFixed(2);

                // Independent TP offset calculation
                let shadowTpTarget = baseE + stopDistBase; // fallback default
                if (!isNaN(tpOffsetInput) && document.getElementById(`tp-off-${i}`).value !== "") {
                    shadowTpTarget = baseE + (stopDistBase * (1 - (tpOffsetInput / 100)));
                }
                document.getElementById(`tp-off-res-${i}`).value = shadowTpTarget.toFixed(2);

                const customStopDist = activeE - sl;
                if (customStopDist > 0) {
                    const effectiveCustomStopDist = customStopDist * contractMultiplier;

                    let unadjPL_shadowTP = 0, unadjFull_shadowTP = 0, unadjInv_shadowTP = 0;
                    let unadjPL_regTP = 0, unadjFull_regTP = 0, unadjInv_regTP = 0;
                    const unadjBody = bodyBase, unadjRunner = runnerBase;

                    if (entryCond !== "Entry price not hit" && entryCond !== "Only regular entry price is hit" && exitCond !== "No trade") {
                        if (exitCond === "Stopped out") {
                            unadjPL_shadowTP = totalBase * contractMultiplier * (sl - activeE);
                            unadjFull_shadowTP = unadjPL_shadowTP;
                            unadjInv_shadowTP = unadjPL_shadowTP;
                            unadjPL_regTP = unadjPL_shadowTP;
                            unadjFull_regTP = unadjPL_shadowTP;
                            unadjInv_regTP = unadjPL_shadowTP;
                        } else if (exitCond === "TP not hit, flattened") {
                            unadjPL_shadowTP = totalBase * contractMultiplier * (flatPrice - activeE);
                            unadjFull_shadowTP = unadjPL_shadowTP;
                            unadjInv_shadowTP = unadjPL_shadowTP;
                            unadjPL_regTP = unadjPL_shadowTP;
                            unadjFull_regTP = unadjPL_shadowTP;
                            unadjInv_regTP = unadjPL_shadowTP;
                        } else if (exitCond === "TP hit, stopped out" || exitCond === "TP hit, flattened") {
                            // Shadow Target Calculation
                            const pClose_shadow = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            unadjPL_shadowTP = (unadjBody * contractMultiplier * (shadowTpTarget - activeE)) + (unadjRunner * contractMultiplier * (pClose_shadow - activeE));
                            unadjFull_shadowTP = totalBase * contractMultiplier * (shadowTpTarget - activeE);
                            unadjInv_shadowTP = (unadjBody * contractMultiplier * (pClose_shadow - activeE)) + (unadjRunner * contractMultiplier * (shadowTpTarget - activeE));

                            // Regular Baseline Target Extended Calculation
                            const pClose_reg = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            unadjPL_regTP = (unadjBody * contractMultiplier * (tpTargetBase - activeE)) + (unadjRunner * contractMultiplier * (pClose_reg - activeE));
                            unadjFull_regTP = totalBase * contractMultiplier * (tpTargetBase - activeE);
                            unadjInv_regTP = (unadjBody * contractMultiplier * (pClose_reg - activeE)) + (unadjRunner * contractMultiplier * (tpTargetBase - activeE));
                        }
                    }

                    const unadjPct_sTP = (unadjPL_shadowTP / b) * 100;
                    const unadjCol_sTP = unadjPL_shadowTP >= 0 ? '#22c55e' : '#ef4444';
                    const unadjSign_sTP = unadjPL_shadowTP >= 0 ? '+' : '';

                    const unadjPct_rTP = (unadjPL_regTP / b) * 100;
                    const unadjCol_rTP = unadjPL_regTP >= 0 ? '#22c55e' : '#ef4444';
                    const unadjSign_rTP = unadjPL_regTP >= 0 ? '+' : '';

                    const adjTotal = (brokerage === "ETRADE") ? Math.floor(maxAllowedRiskDollars / effectiveCustomStopDist) : parseFloat((maxAllowedRiskDollars / effectiveCustomStopDist).toFixed(2));
                    const adjBody = (brokerage === "ETRADE") ? Math.floor(adjTotal / 3) : parseFloat((adjTotal / 3).toFixed(2));
                    const adjRunner = (brokerage === "ETRADE") ? (adjTotal - adjBody) : parseFloat((adjTotal - adjBody).toFixed(2));

                    let adjPL_shadowTP = 0, adjFull_shadowTP = 0, adjInv_shadowTP = 0;
                    let adjPL_regTP = 0, adjFull_regTP = 0, adjInv_regTP = 0;

                    if (entryCond !== "Entry price not hit" && entryCond !== "Only regular entry price is hit" && exitCond !== "No trade") {
                        if (exitCond === "Stopped out") {
                            adjPL_shadowTP = adjTotal * contractMultiplier * (sl - activeE);
                            adjFull_shadowTP = adjPL_shadowTP;
                            adjInv_shadowTP = adjPL_shadowTP;
                            adjPL_regTP = adjPL_shadowTP;
                            adjFull_regTP = adjPL_shadowTP;
                            adjInv_regTP = adjPL_shadowTP;
                        } else if (exitCond === "TP not hit, flattened") {
                            adjPL_shadowTP = adjTotal * contractMultiplier * (flatPrice - activeE);
                            adjFull_shadowTP = adjPL_shadowTP;
                            adjInv_shadowTP = adjPL_shadowTP;
                            adjPL_regTP = adjPL_shadowTP;
                            adjFull_regTP = adjPL_shadowTP;
                            adjInv_regTP = adjPL_shadowTP;
                        } else if (exitCond === "TP hit, stopped out" || exitCond === "TP hit, flattened") {
                            const pClose_shadow_adj = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            adjPL_shadowTP = (adjBody * contractMultiplier * (shadowTpTarget - activeE)) + (adjRunner * contractMultiplier * (pClose_shadow_adj - activeE));
                            adjFull_shadowTP = adjTotal * contractMultiplier * (shadowTpTarget - activeE);
                            adjInv_shadowTP = (adjBody * contractMultiplier * (pClose_shadow_adj - activeE)) + (adjRunner * contractMultiplier * (shadowTpTarget - activeE));

                            const pClose_reg_adj = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            adjPL_regTP = (adjBody * contractMultiplier * (tpTargetBase - activeE)) + (adjRunner * contractMultiplier * (pClose_reg_adj - activeE));
                            adjFull_regTP = adjTotal * contractMultiplier * (tpTargetBase - activeE);
                            adjInv_regTP = (adjBody * contractMultiplier * (pClose_reg_adj - activeE)) + (adjRunner * contractMultiplier * (tpTargetBase - activeE));
                        }
                    }

                    const adjPct_sTP = (adjPL_shadowTP / b) * 100;
                    const adjCol_sTP = adjPL_shadowTP >= 0 ? '#22c55e' : '#ef4444';
                    const adjSign_sTP = adjPL_shadowTP >= 0 ? '+' : '';

                    const adjPct_rTP = (adjPL_regTP / b) * 100;
                    const adjCol_rTP = adjPL_regTP >= 0 ? '#22c55e' : '#ef4444';
                    const adjSign_rTP = adjPL_regTP >= 0 ? '+' : '';

                    document.getElementById(`off-metrics-${i}`).innerHTML = `<b>Shadow Trade Comparisons & P&L:</b><br>
                    Shadow E: ${activeE.toFixed(2)} | Shadow TP: ${shadowTpTarget.toFixed(2)}<br>
                    <b>1. Unadj (${totalBase} ${unitLabel}):</b><br>
                    &nbsp;&bull; Shadow TP: <span style="color:${unadjCol_sTP}">${unadjSign_sTP}${unadjPct_sTP.toFixed(2)}% ($${unadjPL_shadowTP.toFixed(2)})</span> | Full: $${unadjFull_shadowTP.toFixed(2)} | Inv: $${unadjInv_shadowTP.toFixed(2)}<br>
                    &nbsp;&bull; Regular TP: <span style="color:${unadjCol_rTP}">${unadjSign_rTP}${unadjPct_rTP.toFixed(2)}% ($${unadjPL_regTP.toFixed(2)})</span> | Full: $${unadjFull_regTP.toFixed(2)} | Inv: $${unadjInv_regTP.toFixed(2)}<br>
                    <b>2. Recalc (${adjTotal} ${unitLabel}):</b><br>
                    &nbsp;&bull; Shadow TP: <span style="color:${adjCol_sTP}">${adjSign_sTP}${adjPct_sTP.toFixed(2)}% ($${adjPL_shadowTP.toFixed(2)})</span> | Full: $${adjFull_shadowTP.toFixed(2)} | Inv: $${adjInv_shadowTP.toFixed(2)}<br>
                    &nbsp;&bull; Regular TP: <span style="color:${adjCol_rTP}">${adjSign_rTP}${adjPct_rTP.toFixed(2)}% ($${adjPL_regTP.toFixed(2)})</span> | Full: $${adjFull_regTP.toFixed(2)} | Inv: $${adjInv_regTP.toFixed(2)}`;
                } else {
                    document.getElementById(`off-metrics-${i}`).innerHTML = `<span style="color:#ef4444;">Error: Custom entry below stop loss.</span>`;
                }
            } else {
                document.getElementById(`off-res-${i}`).value = "";
                document.getElementById(`tp-off-res-${i}`).value = "";
                document.getElementById(`off-metrics-${i}`).innerHTML = `Custom Entry Adjustments: Enter Offset %`;
            }
        }

        function exportCSV() {
            let csv = "Date,Status,Brokerage,Ticker,Balance,Risk%,ATR,15mHigh,15mLow,VolRatio%,Entry,SL,TP," +
                      "EntryCondition,ExitCondition," +
                      "EntryPriceHit,EntryTime,ShadowEntryHit,ShadowTime," +
                      "IntradayHigh,IntradayHighTime,IntradayLow,IntradayLowTime," +
                      "IntraTradeHigh,IntraTradeHighTime,IntraTradeLow,IntraTradeLowTime,FlattenedPrice,Offset%,TPOffset%," +
                      "RegStandardPct,RegStandard$,RegFullTPPct,RegFullTP$,Reg13RunnerPct,Reg13Runner$,[" +
                      "ShadowUnadj_ShadowTP_StandardPct,ShadowUnadj_ShadowTP_Standard$,ShadowUnadj_ShadowTP_FullTP$,ShadowUnadj_ShadowTP_Inv$,[" +
                      "ShadowUnadj_RegularTP_StandardPct,ShadowUnadj_RegularTP_Standard$,ShadowUnadj_RegularTP_FullTP$,ShadowUnadj_RegularTP_Inv$,[" +
                      "ShadowAdj_ShadowTP_StandardPct,ShadowAdj_ShadowTP_Standard$,ShadowAdj_ShadowTP_FullTP$,ShadowAdj_ShadowTP_Inv$,[" +
                      "ShadowAdj_RegularTP_StandardPct,ShadowAdj_RegularTP_Standard$,ShadowAdj_RegularTP_FullTP$,ShadowAdj_RegularTP_Inv$,TradeNotes\n";

            for(let i=0; i<8; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const riskInput = document.getElementById(`gRisk-${i}`).value;
                const r = riskInput === "" ? 0 : parseFloat(riskInput)/100;
                const brokerage = document.getElementById(`m-${i}`).value;
                const ticker = (document.getElementById(`t-${i}`).value || "").trim().toUpperCase();
                const baseE = h + (h * 0.001) + (a * 0.05);
                const sl = l - (a * 0.1);
                const stopDistBase = baseE - sl;
                const sat = ((h - l) / a) * 100;
                
                const minSatVal = parseFloat(document.getElementById(`gMin-${i}`).value);
                const maxSatVal = parseFloat(document.getElementById(`gMax-${i}`).value);
                const minValid = !isNaN(minSatVal) && document.getElementById(`gMin-${i}`).value !== "";
                const maxValid = !isNaN(maxSatVal) && document.getElementById(`gMax-${i}`).value !== "";
                
                let status = "DISQUALIFIED";
                if (minValid && maxValid) {
                    if (sat >= minSatVal && sat <= maxSatVal) status = "APPROVED";
                } else if (minValid) {
                    if (sat >= minSatVal) status = "APPROVED";
                } else if (maxValid) {
                    if (sat <= maxSatVal) status = "APPROVED";
                }

                const entryCond = document.getElementById(`entry-cond-${i}`).value;
                const exitCond = document.getElementById(`exit-cond-${i}`).value;
                const entryPriceHit = document.getElementById(`entry-price-${i}`).value || 0;
                const entryTime = document.getElementById(`entry-time-${i}`).value || "";
                const shadowPriceHit = document.getElementById(`shadow-price-${i}`).value || 0;
                const shadowTime = document.getElementById(`shadow-time-${i}`).value || "";
                const ih = document.getElementById(`ih-${i}`).value || 0;
                const ihTime = document.getElementById(`ih-time-${i}`).value || "";
                const il = document.getElementById(`il-${i}`).value || 0;
                const ilTime = document.getElementById(`il-time-${i}`).value || "";
                const ith = document.getElementById(`ith-${i}`).value || 0;
                const ithTime = document.getElementById(`ith-time-${i}`).value || "";
                const itl = document.getElementById(`itl-${i}`).value || 0;
                const itlTime = document.getElementById(`itl-time-${i}`).value || "";
                const flatPrice = parseFloat(document.getElementById(`ex-${i}`).value) || baseE;
                const offsetInput = parseFloat(document.getElementById(`off-${i}`).value) || 0;
                const tpOffsetInput = parseFloat(document.getElementById(`tp-off-${i}`).value) || 0;
                const notes = document.getElementById(`n1-${i}`).value.replace(/"/g, '""');

                let contractMultiplier = 1;
                if (brokerage === "MT5" && (ticker.includes("XUSD") || ticker.includes("XAU"))) {
                    contractMultiplier = 100;
                }

                const maxAllowedRiskDollars = b * r;
                const effectiveStopDistBase = stopDistBase * contractMultiplier;
                const totalBase = (brokerage === "ETRADE") ? Math.floor(maxAllowedRiskDollars / effectiveStopDistBase) : parseFloat((maxAllowedRiskDollars / effectiveStopDistBase).toFixed(2));
                const bodyBase = (brokerage === "ETRADE") ? Math.floor(totalBase / 3) : parseFloat((totalBase / 3).toFixed(2));
                const runnerBase = (brokerage === "ETRADE") ? (totalBase - bodyBase) : parseFloat((totalBase - bodyBase).toFixed(2));
                const tpTargetBase = baseE + stopDistBase;

                let regStd$ = 0, regFull$ = 0, regInv$ = 0;
                if (entryCond !== "Entry price not hit" && entryCond !== "Shadow entry hit" && exitCond !== "No trade" && stopDistBase > 0) {
                    if (exitCond === "Stopped out") {
                        regStd$ = totalBase * contractMultiplier * (sl - baseE);
                        regFull$ = regStd$;
                        regInv$ = regStd$;
                    } else if (exitCond === "TP not hit, flattened") {
                        regStd$ = totalBase * contractMultiplier * (flatPrice - baseE);
                        regFull$ = regStd$;
                        regInv$ = regStd$;
                    } else if (exitCond === "TP hit, stopped out") {
                        regStd$ = (bodyBase * contractMultiplier * (tpTargetBase - baseE)) + (runnerBase * contractMultiplier * (baseE - baseE));
                        regFull$ = totalBase * contractMultiplier * (tpTargetBase - baseE);
                        regInv$ = (bodyBase * contractMultiplier * (baseE - baseE)) + (runnerBase * contractMultiplier * (tpTargetBase - baseE));
                    } else if (exitCond === "TP hit, flattened") {
                        regStd$ = (bodyBase * contractMultiplier * (tpTargetBase - baseE)) + (runnerBase * contractMultiplier * (flatPrice - baseE));
                        regFull$ = totalBase * contractMultiplier * (tpTargetBase - baseE);
                        regInv$ = (bodyBase * contractMultiplier * (flatPrice - baseE)) + (runnerBase * contractMultiplier * (tpTargetBase - baseE));
                    }
                }
                const regStdPct = (regStd$ / b) * 100;
                const regFullPct = (regFull$ / b) * 100;
                const regInvPct = (regInv$ / b) * 100;

                let s_unadj_sTP_std$ = 0, s_unadj_sTP_full$ = 0, s_unadj_sTP_inv$ = 0;
                let s_unadj_rTP_std$ = 0, s_unadj_rTP_full$ = 0, s_unadj_rTP_inv$ = 0;
                let s_adj_sTP_std$ = 0, s_adj_sTP_full$ = 0, s_adj_sTP_inv$ = 0;
                let s_adj_rTP_std$ = 0, s_adj_rTP_full$ = 0, s_adj_rTP_inv$ = 0;

                if (entryCond !== "Entry price not hit" && entryCond !== "Only regular entry price is hit" && exitCond !== "No trade" && !isNaN(offsetInput) && document.getElementById(`off-${i}`).value !== "" && stopDistBase > 0) {
                    const activeE = baseE - (stopDistBase * (offsetInput / 100));
                    let shadowTpTarget = baseE + stopDistBase;
                    if (!isNaN(tpOffsetInput) && document.getElementById(`tp-off-${i}`).value !== "") {
                        shadowTpTarget = baseE + (stopDistBase * (1 - (tpOffsetInput / 100)));
                    }

                    const customStopDist = activeE - sl;
                    if (customStopDist > 0) {
                        const unadjBody = bodyBase;
                        const unadjRunner = runnerBase;

                        if (exitCond === "Stopped out") {
                            s_unadj_sTP_std$ = totalBase * contractMultiplier * (sl - activeE);
                            s_unadj_sTP_full$ = s_unadj_sTP_std$;
                            s_unadj_sTP_inv$ = s_unadj_sTP_std$;
                            s_unadj_rTP_std$ = s_unadj_sTP_std$;
                            s_unadj_rTP_full$ = s_unadj_sTP_std$;
                            s_unadj_rTP_inv$ = s_unadj_sTP_std$;
                        } else if (exitCond === "TP not hit, flattened") {
                            s_unadj_sTP_std$ = totalBase * contractMultiplier * (flatPrice - activeE);
                            s_unadj_sTP_full$ = s_unadj_sTP_std$;
                            s_unadj_sTP_inv$ = s_unadj_sTP_std$;
                            s_unadj_rTP_std$ = s_unadj_sTP_std$;
                            s_unadj_rTP_full$ = s_unadj_sTP_std$;
                            s_unadj_rTP_inv$ = s_unadj_sTP_std$;
                        } else if (exitCond === "TP hit, stopped out" || exitCond === "TP hit, flattened") {
                            const pClose_s = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            s_unadj_sTP_std$ = (unadjBody * contractMultiplier * (shadowTpTarget - activeE)) + (unadjRunner * contractMultiplier * (pClose_s - activeE));
                            s_unadj_sTP_full$ = totalBase * contractMultiplier * (shadowTpTarget - activeE);
                            s_unadj_sTP_inv$ = (unadjBody * contractMultiplier * (pClose_s - activeE)) + (unadjRunner * contractMultiplier * (shadowTpTarget - activeE));

                            s_unadj_rTP_std$ = (unadjBody * contractMultiplier * (tpTargetBase - activeE)) + (unadjRunner * contractMultiplier * (pClose_s - activeE));
                            s_unadj_rTP_full$ = totalBase * contractMultiplier * (tpTargetBase - activeE);
                            s_unadj_rTP_inv$ = (unadjBody * contractMultiplier * (pClose_s - activeE)) + (unadjRunner * contractMultiplier * (tpTargetBase - activeE));
                        }

                        const effectiveCustomStopDist = customStopDist * contractMultiplier;
                        const adjTotal = (brokerage === "ETRADE") ? Math.floor(maxAllowedRiskDollars / effectiveCustomStopDist) : parseFloat((maxAllowedRiskDollars / effectiveCustomStopDist).toFixed(2));
                        const adjBody = (brokerage === "ETRADE") ? Math.floor(adjTotal / 3) : parseFloat((adjTotal / 3).toFixed(2));
                        const adjRunner = (brokerage === "ETRADE") ? (adjTotal - adjBody) : parseFloat((adjTotal - adjBody).toFixed(2));

                        if (exitCond === "Stopped out") {
                            s_adj_sTP_std$ = adjTotal * contractMultiplier * (sl - activeE);
                            s_adj_sTP_full$ = s_adj_sTP_std$;
                            s_adj_sTP_inv$ = s_adj_sTP_std$;
                            s_adj_rTP_std$ = s_adj_sTP_std$;
                            s_adj_rTP_full$ = s_adj_sTP_std$;
                            s_adj_rTP_inv$ = s_adj_sTP_std$;
                        } else if (exitCond === "TP not hit, flattened") {
                            s_adj_sTP_std$ = adjTotal * contractMultiplier * (flatPrice - activeE);
                            s_adj_sTP_full$ = s_adj_sTP_std$;
                            s_adj_sTP_inv$ = s_adj_sTP_std$;
                            s_adj_rTP_std$ = s_adj_sTP_std$;
                            s_adj_rTP_full$ = s_adj_sTP_std$;
                            s_adj_rTP_inv$ = s_adj_sTP_std$;
                        } else if (exitCond === "TP hit, stopped out" || exitCond === "TP hit, flattened") {
                            const pClose_adj = exitCond === "TP hit, stopped out" ? activeE : flatPrice;
                            s_adj_sTP_std$ = (adjBody * contractMultiplier * (shadowTpTarget - activeE)) + (adjRunner * contractMultiplier * (pClose_adj - activeE));
                            s_adj_sTP_full$ = adjTotal * contractMultiplier * (shadowTpTarget - activeE);
                            s_adj_sTP_inv$ = (adjBody * contractMultiplier * (pClose_adj - activeE)) + (adjRunner * contractMultiplier * (shadowTpTarget - activeE));

                            s_adj_rTP_std$ = (adjBody * contractMultiplier * (tpTargetBase - activeE)) + (adjRunner * contractMultiplier * (pClose_adj - activeE));
                            s_adj_rTP_full$ = adjTotal * contractMultiplier * (tpTargetBase - activeE);
                            s_adj_rTP_inv$ = (adjBody * contractMultiplier * (pClose_adj - activeE)) + (adjRunner * contractMultiplier * (tpTargetBase - activeE));
                        }
                    }
                }

                const s_unadj_sTP_std_pct = (s_unadj_sTP_std$ / b) * 100;
                const s_unadj_rTP_std_pct = (s_unadj_rTP_std$ / b) * 100;
                const s_adj_sTP_std_pct = (s_adj_sTP_std$ / b) * 100;
                const s_adj_rTP_std_pct = (s_adj_rTP_std$ / b) * 100;

                csv += `${new Date().toLocaleDateString()},${status},${brokerage},${ticker},${b},${(r*100).toFixed(2)}%,${a},${h},${l},${sat.toFixed(2)}%,${baseE.toFixed(2)},${sl.toFixed(2)},${tpTargetBase.toFixed(2)},` +
                       `"${entryCond}","${exitCond}",` +
                       `${entryPriceHit},"${entryTime}",${shadowPriceHit},"${shadowTime}",` +
                       `${ih},"${ihTime}",${il},"${ilTime}",` +
                       `${ith},"${ithTime}",${itl},"${itlTime}",${flatPrice},${offsetInput},${tpOffsetInput},` +
                       `${regStdPct.toFixed(3)}%,${regStd$.toFixed(2)},${regFullPct.toFixed(3)}%,${regFull$.toFixed(2)},${regInvPct.toFixed(3)}%,${regInv$.toFixed(2)},` +
                       `${s_unadj_sTP_std_pct.toFixed(3)}%,${s_unadj_sTP_std$.toFixed(2)},${s_unadj_sTP_full$.toFixed(2)},${s_unadj_sTP_inv$.toFixed(2)},` +
                       `${s_unadj_rTP_std_pct.toFixed(3)}%,${s_unadj_rTP_std$.toFixed(2)},${s_unadj_rTP_full$.toFixed(2)},${s_unadj_rTP_inv$.toFixed(2)},` +
                       `${s_adj_sTP_std_pct.toFixed(3)}%,${s_adj_sTP_std$.toFixed(2)},${s_adj_sTP_full$.toFixed(2)},${s_adj_sTP_inv$.toFixed(2)},` +
                       `${s_adj_rTP_std_pct.toFixed(3)}%,${s_adj_rTP_std$.toFixed(2)},${s_adj_rTP_full$.toFixed(2)},${s_adj_rTP_inv$.toFixed(2)},"${notes}"\n`;
            }

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Engine61_8Tile_Comprehensive_Forensic_Log.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = init;
    </script>
</body>
</html>
