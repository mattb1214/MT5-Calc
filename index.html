<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 64</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; --shadow: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.9em; margin: 10px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); color: #e2e8f0; }
        .shadow-output { background: #161e2e; border-left: 4px solid var(--shadow); color: #fbbf24; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; }
        .export-btn { margin-top: 20px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Engine 64</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:60px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:60px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:60px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Engine 64 CSV</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="15m Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Calculations...</div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:2px;">
                            <select id="ec-${i}" onchange="calc(${i})"><option value="No Entry">No Entry</option><option value="Actual Only">Actual</option><option value="Shadow Only">Shadow</option><option value="Both Entered">Both</option></select>
                            <select id="t1-${i}" onchange="calc(${i})"><option value="No T1">No T1</option><option value="T1 Hit">T1 Hit</option></select>
                            <select id="ex-${i}" onchange="calc(${i})"><option value="Stopped Out">Stopped Out</option><option value="Flattened">Flattened</option></select>
                        </div>
                        <div style="display:flex; gap:5px;"><input type="time" id="te-${i}" placeholder="Time Entry"><input type="time" id="th-${i}" placeholder="Time High"><input type="time" id="tl-${i}" placeholder="Time Low"></div>
                        <div class="output shadow-output" id="sres-${i}">Shadow: Calculations...</div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Flatten Px" id="fp-${i}" oninput="calc(${i})"><input type="number" placeholder="Max Price" id="mp-${i}"></div>
                        <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const brokerage = document.getElementById(`m-${i}`).value;
            const r = parseFloat(document.getElementById('gRisk').value)/100;
            const eCond = document.getElementById(`ec-${i}`).value;
            const t1Hit = document.getElementById(`t1-${i}`).value === "T1 Hit";
            const exit = document.getElementById(`ex-${i}`).value;
            const flatP = parseFloat(document.getElementById(`fp-${i}`).value) || 0;

            if(!b || !a || !h || !l) return;

            const e = h + (h * 0.001) + (a * 0.05);
            const sl = l - (a * 0.1);
            const stopDist = e - sl;
            const tp1 = e + stopDist;

            const processSide = (entry) => {
                const vol = (brokerage === "ETRADE") ? Math.floor((b * r) / (entry - sl)) : parseFloat(((b * r) / (entry - sl)).toFixed(2));
                let pl = 0;
                if (t1Hit) {
                    pl += (tp1 - entry) * (vol / 3);
                    const runnerExit = (exit === "Stopped Out") ? entry : flatP;
                    pl += (runnerExit - entry) * (vol * (2/3));
                } else {
                    const finalExit = (exit === "Stopped Out") ? sl : flatP;
                    pl += (finalExit - entry) * vol;
                }
                return { pl: pl.toFixed(2), vol: vol };
            };

            const actual = processSide(e);
            const shadow = processSide(e - (stopDist * 0.25));

            document.getElementById(`res-${i}`).innerHTML = `Actual P/L: ${actual.pl} | Vol: ${actual.vol}`;
            document.getElementById(`sres-${i}`).innerHTML = `Shadow P/L: ${shadow.pl} | Delta: ${(shadow.pl - actual.pl).toFixed(2)}`;
        }

        function exportCSV() {
            let csv = "Date,Ticker,EntryCondition,T1Status,ExitMethod,TimeEntry,TimeHigh,TimeLow,ActualPL,ShadowPL,Delta\n";
            for(let i=0; i<8; i++) {
                csv += `${new Date().toLocaleDateString()},${document.getElementById(`t-${i}`).value},${document.getElementById(`ec-${i}`).value},${document.getElementById(`t1-${i}`).value},${document.getElementById(`ex-${i}`).value},${document.getElementById(`te-${i}`).value},${document.getElementById(`th-${i}`).value},${document.getElementById(`tl-${i}`).value},...\n`;
            }
            const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Forensic_Log_Engine64.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
