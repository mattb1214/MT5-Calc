<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-size: 0.9em; }
        .approved { color: #4ade80; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .download-btn { background: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol" oninput="runEngine()">
        <select id="mode" onchange="runEngine()">
            <option value="MT5">MT5 (Lots)</option>
            <option value="ETRADE">E*TRADE (Shares)</option>
        </select>
        <input type="number" id="balance" placeholder="Balance ($)" oninput="runEngine()">
        <input type="number" id="risk" placeholder="Risk (%)" oninput="runEngine()">
        <input type="number" id="atr" placeholder="14-Day ATR" oninput="runEngine()">
        <input type="number" id="high" placeholder="Bracket High" oninput="runEngine()">
        <input type="number" id="low" placeholder="Bracket Low" oninput="runEngine()">
        
        <div id="output" class="result">Awaiting inputs...</div>
        <button class="btn download-btn" onclick="downloadCSV()">Download Journal as CSV</button>
    </div>

    <script>
        let currentTrade = null;
        let tradeLog = [];

        function runEngine() {
            const ticker = document.getElementById('ticker').value;
            const mode = document.getElementById('mode').value;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);

            if (!ticker || !bal || !risk || !atr || !high || !low) return;

            const saturation = ((high - low) / atr) * 100;
            const cashRisk = bal * (risk / 100);
            const buffer = atr * 0.10;
            const sl = low - buffer;
            const entry = high + 0.02;
            const tp = entry + (high - low);
            const stopDist = entry - sl;

            let html = `<strong>Saturation: ${saturation.toFixed(1)}%</strong><br>`;

            if (saturation < 32.5 || saturation > 52.5) {
                html += `<span class="disqualified">DISQUALIFIED: Outside Sweet Spot</span>`;
                currentTrade = null;
            } else {
                currentTrade = { date: new Date().toLocaleString(), ticker, mode, saturation, entry, sl, tp, total: 0, body: 0, runner: 0 };
                html += `<span class="approved">APPROVED</span><br>
                         Entry: ${entry.toFixed(2)}<br>Stop Loss: ${sl.toFixed(2)}<br>TP: ${tp.toFixed(2)}<hr>`;
                
                if (mode === 'MT5') {
                    currentTrade.total = (cashRisk / stopDist).toFixed(2);
                    currentTrade.body = (currentTrade.total * 0.33).toFixed(2);
                    currentTrade.runner = (currentTrade.total * 0.66).toFixed(2);
                    html += `Total: ${currentTrade.total} Lots<br>1/3: ${currentTrade.body} | 2/3: ${currentTrade.runner}`;
                } else {
                    currentTrade.total = Math.floor(cashRisk / stopDist);
                    currentTrade.body = Math.floor(currentTrade.total * 0.33);
                    currentTrade.runner = currentTrade.total - currentTrade.body;
                    html += `Total: ${currentTrade.total} Shares<br>1/3: ${currentTrade.body} | 2/3: ${currentTrade.runner}`;
                }
                html += `<button class="btn" onclick="captureTrade()">Capture Trade</button>`;
            }
            document.getElementById('output').innerHTML = html;
        }

        function captureTrade() {
            if (!currentTrade) return;
            tradeLog.push(currentTrade);
            alert("Trade captured for " + currentTrade.ticker);
            document.getElementById('ticker').value = '';
            document.getElementById('balance').value = '';
            document.getElementById('risk').value = '';
            document.getElementById('atr').value = '';
            document.getElementById('high').value = '';
            document.getElementById('low').value = '';
            document.getElementById('output').innerHTML = "Awaiting inputs...";
            currentTrade = null;
        }

        function downloadCSV() {
            if (tradeLog.length === 0) { alert("No trades captured yet!"); return; }
            let csv = "Date,Ticker,Mode,Saturation,Entry,Stop Loss,Take Profit,Total,Body,Runner\n";
            tradeLog.forEach(t => {
                csv += `${t.date},${t.ticker},${t.mode},${t.saturation.toFixed(1)},${t.entry.toFixed(2)},${t.sl.toFixed(2)},${t.tp.toFixed(2)},${t.total},${t.body},${t.runner}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'trading_journal.csv');
            a.click();
        }
    </script>
</body>
</html>
