<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; }
        .highlight { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Trading Engine</h2>
        <select id="mode" onchange="calculate()" style="width:100%; padding:10px;">
            <option value="MT5">MT5 (Lots)</option>
            <option value="ETRADE">E*TRADE (Shares)</option>
        </select>
        <input type="number" id="balance" placeholder="Balance ($)" oninput="calculate()">
        <input type="number" id="risk" placeholder="Risk (%)" oninput="calculate()">
        <input type="number" id="atr" placeholder="14-Day ATR" oninput="calculate()">
        <input type="number" id="high" placeholder="Bracket High" oninput="calculate()">
        <input type="number" id="low" placeholder="Bracket Low" oninput="calculate()">
        
        <div id="output" class="result">Awaiting inputs...</div>
    </div>

    <script>
        function calculate() {
            const mode = document.getElementById('mode').value;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);

            if (!bal || !risk || !atr || !high || !low) return;

            const saturation = ((high - low) / atr) * 100;
            if (saturation < 32.5 || saturation > 52.5) {
                document.getElementById('output').innerHTML = `<span style="color:red">DISQUALIFIED: Saturation ${saturation.toFixed(1)}%</span>`;
                return;
            }

            const cashRisk = bal * (risk / 100);
            const stopDist = high - (low - (atr * 0.1));
            
            let html = `<strong>APPROVED: Saturation ${saturation.toFixed(1)}%</strong><br>`;
            if (mode === 'MT5') {
                const total = cashRisk / stopDist;
                html += `Total: ${total.toFixed(2)} Lots<br>
                         Core (2/3): ${(total * 0.66).toFixed(2)} Lots<br>
                         Runner (1/3): ${(total * 0.33).toFixed(2)} Lots`;
            } else {
                const total = Math.floor(cashRisk / stopDist);
                html += `Total: ${total} Shares<br>
                         Core (2/3): ${Math.floor(total * 0.66)} Shares<br>
                         Runner (1/3): ${total - Math.floor(total * 0.66)} Shares`;
            }
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
