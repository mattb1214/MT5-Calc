<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-size: 0.9em; }
        .approved { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol" oninput="runEngine()">
        <select id="mode" onchange="runEngine()">
            <option value="MT5">MT5 (Lots)</option>
            <option value="ETRADE">E*TRADE (Shares)</option>
        </select>
        <input type="number" id="balance" placeholder="Balance ($)" oninput="runEngine()">
        <input type="number" id="risk" placeholder="Risk (%)" oninput="runEngine()">
        <input type="number" id="atr" placeholder="14-Day ATR" oninput="runEngine()">
        <input type="number" id="high" placeholder="Bracket High" oninput="runEngine()">
        <input type="number" id="low" placeholder="Bracket Low" oninput="runEngine()">
        
        <div id="output" class="result">Awaiting inputs...</div>
        <button class="btn" style="background:#10b981" onclick="downloadCSV()">Download Journal as CSV</button>
    </div>

    <script>
        let currentTrade = null;
        let tradeLog = [];

        function runEngine() {
            const ticker = document.getElementById('ticker').value;
            const mode = document.getElementById('mode').value;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);

            if (!ticker || !bal || !risk || !atr || !high || !low) return;

            const entry = high + 0.02;
            const sl = low - (atr * 0.10);
            const stopDist = entry - sl;
            const cashRisk = bal * (risk / 100);

            let total = (mode === 'MT5') ? (cashRisk / stopDist).toFixed(2) : Math.floor(cashRisk / stopDist);
            let body = (mode === 'MT5') ? (total * 0.33).toFixed(2) : Math.floor(total * 0.33);
            let runner = (mode === 'MT5') ? (total * 0.66).toFixed(2) : (total - body);

            currentTrade = { date: new Date().toLocaleString(), ticker, mode, entry, sl, total, body, runner };
            
            document.getElementById('output').innerHTML = `<span class="approved">APPROVED</span><br>
                Entry: ${entry.toFixed(2)} | Stop: ${sl.toFixed(2)}<br>
                Total: ${total} | Body: ${body} | Runner: ${runner}<br>
                <button class="btn" onclick="captureTrade()">Capture Trade</button>`;
        }

        function captureTrade() {
            if (!currentTrade) return;
            tradeLog.push(currentTrade);
            alert("Trade captured for " + currentTrade.ticker);
        }

        function downloadCSV() {
            let csv = "Date,Ticker,Mode,Entry,Stop,Total,Body,Runner\n";
            tradeLog.forEach(t => {
                csv += `"${t.date}",${t.ticker},${t.mode},${t.entry.toFixed(2)},${t.sl.toFixed(2)},${t.total},${t.body},${t.runner}\n`;
            });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'trading_journal.csv';
            a.click();
        }
    </script>
</body>
</html>
