<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Engine V25</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .output { font-family: monospace; font-size: 0.9em; margin: 15px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); color: #94a3b8; }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .forensic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 8px; margin: 4px 0; background: #334155; color: #fff; border: 1px solid #475569; border-radius: 4px; }
        textarea { height: 60px; resize: vertical; }
        .export-btn { margin-top: 30px; padding: 18px; background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        .export-btn:hover { background: #4338ca; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h2>Strategy Engine V25</h2>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Analytics Log</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Entry/SL/TP values will appear here...</div>
                        <div class="forensic-grid">
                            <span>E(1):<input type="number" id="s-e-${i}"></span><span>T1:<input type="number" id="s-t1-${i}"></span><span>T2:<input type="number" id="s-t2-${i}"></span>
                            <span>T3:<input type="number" id="s-t3-${i}"></span><span>S:<input type="number" id="s-s-${i}"></span><span>F:<input type="number" id="s-f-${i}"></span>
                        </div>
                        <input type="number" placeholder="Intra High" id="rh-${i}">
                        <input type="number" placeholder="Intra Low" id="rl-${i}">
                        <input type="number" placeholder="Flatten Price" id="ex-${i}" oninput="calc(${i})">
                        <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                        <textarea placeholder="Day Notes" id="n2-${i}"></textarea>
                        <textarea placeholder="System Edits" id="n3-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const bal = parseFloat(document.getElementById(`b-${i}`).value);
            const atr = parseFloat(document.getElementById(`a-${i}`).value);
            const high = parseFloat(document.getElementById(`h-${i}`).value);
            const low = parseFloat(document.getElementById(`l-${i}`).value);
            if(!bal || !atr || !high || !low) return;

            const entry = high + ((high * 0.001) + (atr * 0.05 * 0.1));
            const sl = low - (atr * 0.1);
            const dist = entry - sl;
            const sat = ((high - low) / atr) * 100;
            const isMT5 = document.getElementById(`m-${i}`).value === 'MT5';
            const total = isMT5 ? ((bal * 0.0075) / dist).toFixed(2) : Math.round((bal * 0.0075) / dist);
            
            document.getElementById(`res-${i}`).innerHTML = `
                <b class="${sat >= 32.5 && sat <= 52.5 ? 'approved' : 'disqualified'}">${sat >= 32.5 && sat <= 52.5 ? 'APPROVED' : 'DISQUALIFIED'} (${sat.toFixed(1)}%)</b><br>
                E: ${entry.toFixed(2)} | SL: ${sl.toFixed(2)}<br>
                TP1: ${(entry+dist).toFixed(2)} | TP2: ${(entry+dist*2).toFixed(2)} | TP3: ${(entry+dist*3).toFixed(2)}
            `;
        }

        function exportCSV() {
            let csv = "Date,Brokerage,Ticker,Risk%,ATR,High,Low,VolRatio%,Entry,SL,TP1,TP2,TP3,IntraHigh,IntraLow,Flatten,Sequence,Outcome,GainLoss%,TradeNotes,DayNotes,SystemEdits\n";
            for(let i=0; i<8; i++) {
                const bal = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const entry = h + ((h * 0.001) + (a * 0.05 * 0.1));
                const sl = l - (a * 0.1);
                const flatPrice = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                
                let p = [{e:'E',v:document.getElementById(`s-e-${i}`).value},{e:'T1',v:document.getElementById(`s-t1-${i}`).value},{e:'T2',v:document.getElementById(`s-t2-${i}`).value},{e:'T3',v:document.getElementById(`s-t3-${i}`).value},{e:'S',v:document.getElementById(`s-s-${i}`).value},{e:'F',v:document.getElementById(`s-f-${i}`).value}].filter(x=>x.v!=='').sort((a,b)=>a.v-b.v).map(x=>x.e).join('->');
                
                const outcome = p.includes('T1') || p.includes('T2') || p.includes('T3') ? "Win" : (p.includes('S') ? "Loss" : "No Trade");
                const pct = flatPrice > 0 ? (((flatPrice - entry) / entry) * 100).toFixed(2) : 0;

                csv += `${new Date().toLocaleDateString()},${document.getElementById(`m-${i}`).value},${document.getElementById(`t-${i}`).value},0.75,${a},${h},${l},${((h-l)/a*100).toFixed(1)},${entry.toFixed(2)},${sl.toFixed(2)},${(entry+(entry-sl)).toFixed(2)},${(entry+(entry-sl)*2).toFixed(2)},${(entry+(entry-sl)*3).toFixed(2)},${document.getElementById(`rh-${i}`).value},${document.getElementById(`rl-${i}`).value},${flatPrice},${p},${outcome},${pct},"${document.getElementById(`n1-${i}`).value}","${document.getElementById(`n2-${i}`).value}","${document.getElementById(`n3-${i}`).value}"\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Data_Log_V25.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
