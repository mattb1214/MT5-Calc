<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { flex: 1; padding: 10px; background: #475569; border: none; color: white; border-radius: 6px; cursor: pointer; }
        .active { background: #10b981; }
        .stopped { background: #ef4444 !important; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        .dashboard { margin-top: 15px; border-top: 2px solid #3b82f6; padding-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol" oninput="runEngine()">
        <select id="brokerage" onchange="runEngine()"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
        <input type="number" id="balance" placeholder="Start Balance" oninput="runEngine()">
        <input type="number" id="risk" placeholder="Risk Level (%)" oninput="runEngine()">
        <input type="number" id="atr" placeholder="Daily ATR" oninput="runEngine()">
        <input type="number" id="high" placeholder="15m High" oninput="runEngine()">
        <input type="number" id="low" placeholder="15m Low" oninput="runEngine()">
        
        <div id="output" class="result">Awaiting inputs...</div>

        <div id="dashboard" class="dashboard">
            <h4>Trade Status</h4>
            <div class="btn-group">
                <button class="btn-small" id="placed" onclick="toggleStatus('placed')">Order Placed</button>
                <button class="btn-small" id="entryHit" onclick="toggleStatus('entryHit')">Entry Hit</button>
                <button class="btn-small" id="stopped" onclick="toggleStatus('stopped')">Stopped Out</button>
            </div>
            <div class="btn-group">
                <button class="btn-small" id="tp1" onclick="setTarget(1)">TP1</button>
                <button class="btn-small" id="tp2" onclick="setTarget(2)">TP2</button>
                <button class="btn-small" id="tp3" onclick="setTarget(3)">TP3</button>
            </div>
            <input type="number" id="manualFlat" placeholder="Flatten Price">
            <select id="followed"><option value="Y">Followed Strategy: Y</option><option value="N">Followed Strategy: N</option></select>
            <button class="btn" style="background:#f59e0b" onclick="saveFinal()">Save Final Results</button>
        </div>
        <button class="btn" style="background:#10b981; margin-top:10px" onclick="downloadCSV()">Download CSV</button>
    </div>

    <script>
        let currentTrade = {};
        let tradeLog = [];
        let status = { placed: false, entryHit: false, stopped: false };

        function runEngine() {
            const inputs = ['ticker', 'balance', 'risk', 'atr', 'high', 'low'];
            if (inputs.some(id => !document.getElementById(id).value)) return;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const mode = document.getElementById('brokerage').value;

            const entry = high + 0.02;
            const sl = low - (atr * 0.10);
            const stopDist = entry - sl;
            let total = (mode === 'MT5') ? (bal*(risk/100)/stopDist).toFixed(2) : Math.floor(bal*(risk/100)/stopDist);
            let body = (mode === 'MT5') ? (total * 0.33).toFixed(2) : Math.floor(total * 0.33);
            let runner = (mode === 'MT5') ? (total * 0.66).toFixed(2) : (total - body);

            currentTrade = { ticker: document.getElementById('ticker').value, mode, bal, risk, atr, high, low, entry, sl, 
                             tp1: entry + stopDist, tp2: entry + (stopDist * 2), tp3: entry + (stopDist * 3), 
                             total, body, runner, placed: false, entryHit: false, stopped: false, highestHit: 'None' };
            
            document.getElementById('output').innerHTML = `<strong>APPROVED</strong><br>Entry: ${entry.toFixed(2)} | Stop: ${sl.toFixed(2)}<br>TPs: ${currentTrade.tp1.toFixed(2)}, ${currentTrade.tp2.toFixed(2)}, ${currentTrade.tp3.toFixed(2)}<br>Total: ${total} (Body: ${body} | Runner: ${runner})<br><button class="btn" onclick="captureTrade()">Capture Plan</button>`;
        }

        function captureTrade() {
            alert("Plan captured!");
            document.getElementById('dashboard').style.display = 'block';
        }

        function toggleStatus(key) {
            status[key] = !status[key];
            document.getElementById(key).classList.toggle('active');
            if(key === 'stopped') document.getElementById('stopped').classList.toggle('stopped');
        }

        function setTarget(num) {
            let prices = [0, currentTrade.tp1, currentTrade.tp2, currentTrade.tp3];
            document.getElementById('manualFlat').value = prices[num].toFixed(2);
            document.querySelectorAll('.btn-small').forEach(b => b.classList.remove('active'));
            document.getElementById('tp'+num).classList.add('active');
            currentTrade.highestHit = 'TP' + num;
        }

        function saveFinal() {
            currentTrade.fPrice = document.getElementById('manualFlat').value;
            currentTrade.followed = document.getElementById('followed').value;
            currentTrade.actualPnL = (currentTrade.fPrice - currentTrade.entry) * currentTrade.total;
            currentTrade.percentGain = (currentTrade.actualPnL / currentTrade.bal) * 100;
            currentTrade.status = status;
            tradeLog.push(currentTrade);
            alert("Results saved!");
        }

        function downloadCSV() {
            if (tradeLog.length === 0) return;
            let csv = "Date,Ticker,Start Balance,Risk,Entry,TP1,TP2,TP3,Total,Body,Runner,Flatten Price,Actual PnL,Percentage,Stopped Out,Strategy Followed\n";
            tradeLog.forEach(t => {
                csv += `${new Date().toLocaleDateString()},${t.ticker},${t.bal},${t.risk},${t.entry.toFixed(2)},${t.tp1.toFixed(2)},${t.tp2.toFixed(2)},${t.tp3.toFixed(2)},${t.total},${t.body},${t.runner},${t.fPrice},${t.actualPnL.toFixed(2)},${t.percentGain.toFixed(2)}%,${t.status.stopped ? 'Yes' : 'No'},${t.followed}\n`;
            });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'trading_journal.csv';
            a.click();
        }
    </script>
</body>
</html>
