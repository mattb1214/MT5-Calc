<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 42.1</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.85em; margin: 10px 0; background: #020617; padding: 10px; border-left: 4px solid var(--accent); }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .seq-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 5px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; }
        .export-btn { margin-top: 20px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Engine 42.1</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:60px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:60px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:60px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Full Forensic CSV</button>

    <script>
        // Platform-aware unit calculation
        function getUnitCount(b, r, d, brokerage) {
            const raw = (b * r) / d;
            // ETRADE: Shares (Rounded down) | MT5: Lots (Decimal)
            return (brokerage === "ETRADE") ? Math.floor(raw) : (raw / 100).toFixed(2);
        }

        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="15m Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Calculations...</div>
                        <div class="seq-row">
                            <input placeholder="E" id="s-e-${i}"><input placeholder="T1" id="s-t1-${i}"><input placeholder="T2" id="s-t2-${i}"><input placeholder="T3" id="s-t3-${i}"><input placeholder="S" id="s-s-${i}"><input placeholder="F" id="s-f-${i}">
                        </div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="IntraHigh" id="ih-${i}"><input type="number" placeholder="IntraLow" id="il-${i}"><input type="number" placeholder="Flatten" id="ex-${i}"></div>
                        <select id="exit-type-${i}"><option value="Normal">Normal</option><option value="BE">Break Even</option><option value="Stopped">Stopped Out</option></select>
                        <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const brokerage = document.getElementById(`m-${i}`).value;
            const r = parseFloat(document.getElementById('gRisk').value)/100;
            const minS = parseFloat(document.getElementById('gMin').value);
            const maxS = parseFloat(document.getElementById('gMax').value);
            
            if(!b || !a || !h || !l) return;
            
            const e = h + (h*0.001 + a*0.05*0.1);
            const sl = l - (a*0.1);
            const d = e - sl;
            
            const total = getUnitCount(b, r, d, brokerage);
            const sat = ((h - l) / a) * 100;
            const status = (sat >= minS && sat <= maxS) ? "APPROVED" : "DISQUALIFIED";
            const unitLabel = (brokerage === "MT5") ? "Lots" : "Shares";

            document.getElementById(`res-${i}`).innerHTML = `<b class="${status === 'APPROVED' ? 'approved' : 'disqualified'}">${status} (${sat.toFixed(1)}%)</b><br>
            Total: ${total} ${unitLabel}<br>
            E: ${e.toFixed(2)} | SL: ${sl.toFixed(2)}<br>TP1: ${(e+d).toFixed(2)} | TP2: ${(e+d*2).toFixed(2)} | TP3: ${(e+d*3).toFixed(2)}`;
        }

        function exportCSV() {
            let csv = "Date,Brokerage,Ticker,Risk%,ATR,15mHigh,15mLow,VolRatio%,Entry,SL,TP1,TP2,TP3,IntraHigh,IntraLow,Flatten,WinLoss,ExitType,GainLoss%,TradeNotes\n";
            for(let i=0; i<8; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const r = parseFloat(document.getElementById('gRisk').value)/100;
                const brokerage = document.getElementById(`m-${i}`).value;
                const e = h + (h*0.001 + a*0.05*0.1);
                const sl = l - (a*0.1);
                const dist = e - sl;
                const totalUnits = parseFloat(getUnitCount(b, r, dist, brokerage));
                const flatP = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const exitType = document.getElementById(`exit-type-${i}`).value;
                const sat = ((h - l) / a) * 100;

                let pnl = 0;
                if(exitType === "Stopped" || exitType === "BE") {
                    pnl = totalUnits * (flatP - e);
                } else {
                    let remaining = totalUnits;
                    ['t1', 't2', 't3'].forEach(t => {
                        let price = parseFloat(document.getElementById(`s-${t}-${i}`).value);
                        if(price > 0) { pnl += (totalUnits/3) * (price - e); remaining -= (totalUnits/3); }
                    });
                    pnl += remaining * (flatP - e);
                }
                const pct = ((pnl / b) * 100).toFixed(2);
                csv += `${new Date().toLocaleDateString()},${brokerage},${document.getElementById(`t-${i}`).value},${(r*100).toFixed(2)}%,${a},${h},${l},${sat.toFixed(2)}%,${e.toFixed(2)},${sl.toFixed(2)},${(e+dist).toFixed(2)},${(e+dist*2).toFixed(2)},${(e+dist*3).toFixed(2)},${document.getElementById(`ih-${i}`).value},${document.getElementById(`il-${i}`).value},${flatP},${flatP >= e ? "Win" : "Loss"},${exitType},${pct}%,${document.getElementById(`n1-${i}`).value}\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Forensic_Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
