<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .checkbox-label { display: flex; align-items: center; margin: 10px 0; color: #94a3b8; font-size: 0.9em; cursor: pointer; }
        .checkbox-label input { width: auto; margin-right: 8px; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-size: 0.9em; }
        .approved { color: #4ade80; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .download-btn { background: #10b981; }
        .scalp-section { border-top: 1px solid #334155; margin-top: 10px; padding-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol" oninput="runEngine()">
        <select id="mode" onchange="runEngine()">
            <option value="MT5">MT5 (Lots)</option>
            <option value="ETRADE">E*TRADE (Shares)</option>
        </select>
        <input type="number" id="balance" placeholder="Balance ($)" oninput="runEngine()">
        <input type="number" id="risk" placeholder="Breakout Risk (%)" oninput="runEngine()">
        <input type="number" id="scalpRisk" placeholder="Scalp Risk (%)" oninput="runEngine()">
        <input type="number" id="atr" placeholder="14-Day ATR" oninput="runEngine()">
        <input type="number" id="high" placeholder="Bracket High" oninput="runEngine()">
        <input type="number" id="low" placeholder="Bracket Low" oninput="runEngine()">
        
        <label class="checkbox-label">
            <input type="checkbox" id="isGold" onchange="runEngine()"> Trade XAUUSD (Gold - Adjust 100x Contract Size)
        </label>
        
        <div id="output" class="result">Awaiting inputs...</div>
        <button class="btn download-btn" onclick="downloadCSV()">Download Journal as CSV</button>
    </div>

    <script>
        let currentTrade = null;
        let tradeLog = [];

        function runEngine() {
            const ticker = document.getElementById('ticker').value;
            const mode = document.getElementById('mode').value;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const scalpRisk = parseFloat(document.getElementById('scalpRisk').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);
            const isGold = document.getElementById('isGold').checked;

            if (!ticker || !bal || !risk || !scalpRisk || !atr || !high || !low) return;

            const saturation = ((high - low) / atr) * 100;
            const cashRisk = bal * (risk / 100);
            const scalpCashRisk = bal * (scalpRisk / 100);
            const buffer = atr * 0.10;
            const sl = low - buffer;
            const entry = high + 0.02;
            const stopDist = entry - sl;
            
            const tp1 = entry + stopDist;
            const tp2 = entry + (stopDist * 2);
            const tp3 = entry + (stopDist * 3);

            let html = `<strong>Saturation: ${saturation.toFixed(1)}%</strong><br>`;

            if (saturation < 32.5 || saturation > 52.5) {
                html += `<span class="disqualified">DISQUALIFIED: Outside Sweet Spot</span>`;
                currentTrade = null;
            } else {
                currentTrade = { date: new Date().toLocaleString(), ticker, mode, saturation, entry, sl, tp1, tp2, tp3, total: 0, body: 0, runner: 0, scalpSize: 0 };
                html += `<span class="approved">APPROVED</span><br>
                         Entry: ${entry.toFixed(2)}<br>Stop Loss: ${sl.toFixed(2)}<br>
                         1:1 TP: ${tp1.toFixed(2)}<br>
                         1:2 TP: ${tp2.toFixed(2)}<br>
                         1:3 TP: ${tp3.toFixed(2)}<hr>`;
                
                if (mode === 'MT5') {
                    let baseLots = cashRisk / stopDist;
                    let baseScalpLots = scalpCashRisk / stopDist;
                    
                    // Apply Gold / XAUUSD contract size adjustment (1 standard lot = 100 ounces)
                    if (isGold) {
                        baseLots = baseLots / 100;
                        baseScalpLots = baseScalpLots / 100;
                    }

                    currentTrade.total = baseLots.toFixed(2);
                    currentTrade.body = (currentTrade.total * 0.33).toFixed(2);
                    currentTrade.runner = (currentTrade.total * 0.66).toFixed(2);
                    currentTrade.scalpSize = baseScalpLots.toFixed(2);

                    html += `Breakout Total: ${currentTrade.total} Lots<br>1/3: ${currentTrade.body} | 2/3: ${currentTrade.runner}`;
                    html += `<div class="scalp-section">Scalp Size: ${currentTrade.scalpSize} Lots</div>`;
                } else {
                    let baseShares = cashRisk / stopDist;
                    let baseScalpShares = scalpCashRisk / stopDist;

                    if (isGold) {
                        baseShares = baseShares / 100;
                        baseScalpShares = baseScalpShares / 100;
                    }

                    currentTrade.total = Math.floor(baseShares);
                    currentTrade.body = Math.floor(currentTrade.total * 0.33);
                    currentTrade.runner = currentTrade.total - currentTrade.body;
                    currentTrade.scalpSize = Math.floor(baseScalpShares);

                    html += `Breakout Total: ${currentTrade.total} Shares<br>1/3: ${currentTrade.body} | 2/3: ${currentTrade.runner}`;
                    html += `<div class="scalp-section">Scalp Size: ${currentTrade.scalpSize} Shares</div>`;
                }
                html += `<button class="btn" onclick="captureTrade()">Capture Trade</button>`;
            }
            document.getElementById('output').innerHTML = html;
        }

        function captureTrade() {
            if (!currentTrade) return;
            tradeLog.push(currentTrade);
            alert("Trade captured for " + currentTrade.ticker);
            // Reset form fields except the gold checkbox, keeping user preference handy
            ['ticker', 'balance', 'risk', 'scalpRisk', 'atr', 'high', 'low'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('output').innerHTML = "Awaiting inputs...";
            currentTrade = null;
        }

        function downloadCSV() {
            if (tradeLog.length === 0) { alert("No trades captured yet!"); return; }
            let csv = "Date,Ticker,Mode,Saturation,Entry,Stop Loss,1:1 TP,1:2 TP,1:3 TP,Total,Body,Runner,Scalp Size\n";
            tradeLog.forEach(t => {
                let d = t.date.replace(/,/g, ''); 
                csv += `"${d}",${t.ticker},${t.mode},${t.saturation.toFixed(1)},${t.entry.toFixed(2)},${t.sl.toFixed(2)},${t.tp1.toFixed(2)},${t.tp2.toFixed(2)},${t.tp3.toFixed(2)},${t.total},${t.body},${t.runner},${t.scalpSize}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'trading_journal.csv');
            a.click();
        }
    </script>
</body>
</html>
