<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine - Phase 2</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 12px; }
        .config-section { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8em; }
        input, select { width: 100%; padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-capture { background: #10b981; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        .queue-item { background: #334155; padding: 10px; margin-top: 10px; border-radius: 6px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <div class="config-section">
            <strong>Global Settings</strong>
            <input type="number" id="cfgRisk" value="0.75" step="0.01">
            <input type="number" id="cfgMinSat" value="32.5" step="0.1">
            <input type="number" id="cfgMaxSat" value="52.5" step="0.1">
        </div>

        <input type="text" id="ticker" placeholder="Ticker">
        <select id="mode"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
        <input type="number" id="balance" placeholder="Account Balance">
        <input type="number" id="atr" placeholder="ATR">
        <input type="number" id="high" placeholder="15m High">
        <input type="number" id="low" placeholder="15m Low">
        
        <button class="btn btn-capture" onclick="captureTrade()">Capture Trade</button>
        <div id="output" class="result">Enter details to begin...</div>

        <h3>Pending Queue</h3>
        <div id="queue"></div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('tradeQueue')) || [];

        function captureTrade() {
            const trade = {
                ticker: document.getElementById('ticker').value,
                entry: "100.00", // Simplified placeholder logic for demo
                timestamp: new Date().toLocaleTimeString()
            };
            trades.push(trade);
            localStorage.setItem('tradeQueue', JSON.stringify(trades));
            renderQueue();
        }

        function renderQueue() {
            const q = document.getElementById('queue');
            q.innerHTML = trades.map((t, i) => `
                <div class="queue-item">
                    ${t.ticker} - Captured at ${t.timestamp}
                    <button onclick="viewTrade(${i})">View</button>
                </div>
            `).join('');
        }

        renderQueue();
    </script>
</body>
</html>
