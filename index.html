<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Engine V34 - Stability Build</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.85em; margin: 10px 0; background: #020617; padding: 10px; border-left: 4px solid var(--accent); }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .seq-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; border-radius: 4px; }
        .export-btn { margin-top: 30px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Strategy Engine V34</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:60px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:60px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:60px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Data Log</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Calculations...</div>
                        <div class="seq-row">
                            <input placeholder="E" id="s-e-${i}"><input placeholder="T1" id="s-t1-${i}"><input placeholder="T2" id="s-t2-${i}"><input placeholder="T3" id="s-t3-${i}"><input placeholder="S" id="s-s-${i}"><input placeholder="F" id="s-f-${i}">
                        </div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="IH" id="ih-${i}"><input type="number" placeholder="IL" id="il-${i}"><input type="number" placeholder="Flatten" id="ex-${i}" oninput="calc(${i})"></div>
                        <select id="exit-type-${i}"><option value="Normal">Normal</option><option value="BE">Break Even</option><option value="Stopped">Stopped Out</option></select>
                        <textarea placeholder="Notes" id="n1-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            if(!b || !a || !h || !l) return;
            const r = parseFloat(document.getElementById('gRisk').value) / 100;
            const entry = h + ((h * 0.001) + (a * 0.05 * 0.1));
            const sl = l - (a * 0.1);
            const dist = entry - sl;
            const sat = ((h - l) / a) * 100;
            const total = (b * r) / dist;
            const isMT5 = document.getElementById(`m-${i}`).value === 'MT5';
            const c = isMT5 ? total.toFixed(2) : Math.round(total);
            document.getElementById(`res-${i}`).innerHTML = `
                <b class="${sat >= 32.5 && sat <= 52.5 ? 'approved' : 'disqualified'}">${sat >= 32.5 && sat <= 52.5 ? 'APPROVED' : 'DISQUALIFIED'} (${sat.toFixed(1)}%)</b><br>
                Total: ${c} | Body: ${isMT5 ? (c/3).toFixed(2) : Math.round(c/3)} | Runner: ${isMT5 ? (c*2/3).toFixed(2) : Math.round(c*2/3)}<br>
                E: ${entry.toFixed(2)} | SL: ${sl.toFixed(2)} | TP1: ${(entry+dist).toFixed(2)} | TP2: ${(entry+dist*2).toFixed(2)} | TP3: ${(entry+dist*3).toFixed(2)}
            `;
        }

        function exportCSV() {
            let csv = "Date,Ticker,Outcome,ExitType,GainLoss%,TradeNotes\n";
            for(let i=0; i<8; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const r = parseFloat(document.getElementById('gRisk').value) / 100;
                const entry = h + ((h * 0.001) + (a * 0.05 * 0.1));
                const sl = l - (a * 0.1);
                const tp1 = entry + (entry - sl);
                const flat = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const shares = (b * r) / (entry - sl);
                const pnl = flat > 0 ? ((shares/3) * (tp1 - entry)) + ((shares*(2/3)) * (flat - entry)) : 0;
                const pct = b > 0 ? ((pnl / b) * 100).toFixed(2) : 0;
                csv += `${new Date().toLocaleDateString()},${document.getElementById(`t-${i}`).value},${flat > entry ? "Win" : "Loss"},${document.getElementById(`exit-type-${i}`).value},${pct}%,${document.getElementById(`n1-${i}`).value}\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
