<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .config-bar { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        input { width: 100%; padding: 5px; margin: 3px 0; background: #0f172a; color: #fff; border: 1px solid #475569; }
        .output { font-size: 0.75em; margin-top: 10px; color: #cbd5e1; }
        .milestones { display: flex; gap: 5px; margin-top: 10px; }
        .btn { padding: 5px; font-size: 0.65em; cursor: pointer; border: none; border-radius: 3px; background: #475569; color: white; }
        .btn:hover { background: #3b82f6; }
        .export-btn { margin-top: 20px; padding: 15px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Strategy Dashboard</h2>
    <div class="config-bar">
        <div>Risk%: <input type="number" id="gRisk" value="0.75" step="0.01" style="width:50px"></div>
        <div>MinSat: <input type="number" id="gMin" value="32.5" style="width:50px"></div>
        <div>MaxSat: <input type="number" id="gMax" value="52.5" style="width:50px"></div>
        <div>SL Buff: <input type="number" id="gBuff" value="0.10" step="0.01" style="width:50px"></div>
    </div>

    <div class="grid" id="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export All to CSV</button>

    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<8; i++) {
            grid.innerHTML += `
                <div class="card" id="card-${i}">
                    <input type="text" placeholder="Ticker" id="t-${i}">
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="Bal" id="b-${i}">
                        <input type="number" placeholder="ATR" id="a-${i}">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" placeholder="High" id="h-${i}" oninput="calc(${i})">
                        <input type="number" placeholder="Low" id="l-${i}" oninput="calc(${i})">
                    </div>
                    <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                    <div class="output" id="res-${i}">...</div>
                    <div class="milestones">
                        <button class="btn" onclick="this.style.background='green'">P</button>
                        <button class="btn" onclick="this.style.background='green'">E</button>
                        <button class="btn" onclick="this.style.background='green'">T1</button>
                        <button class="btn" onclick="this.style.background='green'">T2</button>
                        <button class="btn" onclick="this.style.background='green'">T3</button>
                        <button class="btn" onclick="this.style.background='red'" style="background:#ef4444">S</button>
                        <button class="btn" onclick="this.style.background='orange'" style="background:#f59e0b">F</button>
                    </div>
                </div>
            `;
        }

        function calc(i) {
            const bal = parseFloat(document.getElementById(`b-${i}`).value);
            const atr = parseFloat(document.getElementById(`a-${i}`).value);
            const high = parseFloat(document.getElementById(`h-${i}`).value);
            const low = parseFloat(document.getElementById(`l-${i}`).value);
            const mode = document.getElementById(`m-${i}`).value;
            if(!bal || !atr || !high || !low) return;

            const sat = ((high - low) / atr) * 100;
            const entry = high + 0.02;
            const sl = low - (atr * parseFloat(document.getElementById('gBuff').value));
            const stopDist = entry - sl;
            const cashRisk = bal * (parseFloat(document.getElementById('gRisk').value) / 100);
            const total = (mode === 'MT5') ? (cashRisk / stopDist).toFixed(2) : Math.floor(cashRisk / stopDist);
            const body = (mode === 'MT5') ? (total / 3).toFixed(2) : Math.floor(total / 3);
            const runner = (mode === 'MT5') ? (total - body).toFixed(2) : (total - body);

            const isApp = (sat >= document.getElementById('gMin').value && sat <= document.getElementById('gMax').value);
            document.getElementById(`res-${i}`).innerHTML = `
                <b>${isApp ? 'APPROVED' : 'DISQUALIFIED'} (${sat.toFixed(1)}%)</b><br>
                E:${entry.toFixed(2)} | SL:${sl.toFixed(2)} | TP1:${(entry+stopDist).toFixed(2)}<br>
                Total: ${total} ${mode==='MT5'?'Lots':'Shares'} | Split: ${body}B / ${runner}R
            `;
        }

        function exportCSV() {
            let csv = "Ticker,Status,Entry,SL,Total,Body,Runner\n";
            for(let i=0; i<8; i++) {
                const t = document.getElementById(`t-${i}`).value;
                if(!t) continue;
                csv += `${t},Data,Captured,Here...\n`;
            }
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'trading_data.csv');
            a.click();
        }
    </script>
</body>
</html>
