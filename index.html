<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-size: 0.9em; }
        .approved { color: #4ade80; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .download-btn { background: #10b981; margin-top: 20px; }
        .analysis-section { border-top: 2px solid #3b82f6; margin-top: 15px; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol" oninput="runEngine()">
        <select id="brokerage" onchange="runEngine()">
            <option value="MT5">MT5</option>
            <option value="ETRADE">E*TRADE</option>
        </select>
        <input type="number" id="balance" placeholder="Start Balance ($)" oninput="runEngine()">
        <input type="number" id="risk" placeholder="Risk (%)" oninput="runEngine()">
        <input type="number" id="atr" placeholder="Daily ATR" oninput="runEngine()">
        <input type="number" id="high" placeholder="15m High" oninput="runEngine()">
        <input type="number" id="low" placeholder="15m Low" oninput="runEngine()">
        
        <label><input type="checkbox" id="isGold" onchange="runEngine()"> Trade XAUUSD (100x)</label>
        
        <div id="output" class="result">Awaiting inputs...</div>
        
        <button class="btn download-btn" onclick="downloadCSV()">Download Journal as CSV</button>
    </div>

    <script>
        let tradeLog = [];
        let activeTrade = null;

        function runEngine() {
            const inputs = ['ticker', 'balance', 'risk', 'atr', 'high', 'low'];
            if (inputs.some(id => !document.getElementById(id).value)) return;

            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const mode = document.getElementById('brokerage').value;
            const isGold = document.getElementById('isGold').checked;

            const saturation = ((high - low) / atr) * 100;
            const entry = high + 0.02;
            const sl = low - (atr * 0.10);
            const stopDist = entry - sl;
            const tp1 = entry + stopDist;
            const tp2 = entry + (stopDist * 2);
            const tp3 = entry + (stopDist * 3);
            const cashRisk = bal * (risk / 100);
            
            let baseSize = (cashRisk / stopDist);
            if (isGold) baseSize /= 100;
            let total = (mode === 'MT5') ? baseSize.toFixed(2) : Math.floor(baseSize);
            let body = (mode === 'MT5') ? (total * 0.33).toFixed(2) : Math.floor(total * 0.33);
            let runner = (mode === 'MT5') ? (total * 0.66).toFixed(2) : (total - body);

            let html = `<strong>Saturation: ${saturation.toFixed(1)}%</strong><br>`;
            if (saturation < 32.5 || saturation > 52.5) {
                html += `<span class="disqualified">DISQUALIFIED: Outside Sweet Spot</span>`;
            } else {
                activeTrade = { ticker: document.getElementById('ticker').value, mode, bal, atr, high, low, entry, sl, tp1, tp2, tp3, cashRisk, total, body, runner };
                html += `<span class="approved">APPROVED</span><br>
                         Entry: ${entry.toFixed(2)} | Stop: ${sl.toFixed(2)}<br>
                         TP1: ${tp1.toFixed(2)} | TP2: ${tp2.toFixed(2)} | TP3: ${tp3.toFixed(2)}<br>
                         Total: ${total} | Body: ${body} | Runner: ${runner}
                         <div class="analysis-section">
                            <input type="number" id="iHigh" placeholder="Intraday High">
                            <input type="number" id="fPrice" placeholder="Flatten Price">
                            <select id="followed"><option value="Y">Followed Strategy: Y</option><option value="N">Followed Strategy: N</option></select>
                            <select id="status"><option value="W">Win</option><option value="L">Loss</option><option value="N">No Trade</option></select>
                            <button class="btn" onclick="captureTrade()">Capture Trade</button>
                         </div>`;
            }
            document.getElementById('output').innerHTML = html;
        }

        function captureTrade() {
            if(!activeTrade) return;
            const iHigh = parseFloat(document.getElementById('iHigh').value);
            const fPrice = parseFloat(document.getElementById('fPrice').value);
            const followed = document.getElementById('followed').value;
            const status = document.getElementById('status').value;

            const actualPnL = (fPrice - activeTrade.entry) * activeTrade.total;
            const percentGain = (actualPnL / activeTrade.bal) * 100; // Percentage of account balance

            tradeLog.push({ ...activeTrade, iHigh, fPrice, followed, status, actualPnL, percentGain });
            alert("Trade captured!");
        }

        function downloadCSV() {
            if (tradeLog.length === 0) { alert("No trades captured!"); return; }
            let csv = "Date,Ticker,Start Balance,Daily ATR,15m High,15m Low,Brokerage,Entry,SL,1:1 TP,1:2 TP,1:3 TP,Total,Body,Runner,Intraday High,Flatten Price,Actual PnL,Percentage of Account,Strategy Followed,Strategy W/L/N\n";
            tradeLog.forEach(t => {
                csv += `${new Date().toLocaleDateString()},${t.ticker},${t.bal},${t.atr},${t.high},${t.low},${t.mode},${t.entry.toFixed(2)},${t.sl.toFixed(2)},${t.tp1.toFixed(2)},${t.tp2.toFixed(2)},${t.tp3.toFixed(2)},${t.total},${t.body},${t.runner},${t.iHigh},${t.fPrice},${t.actualPnL.toFixed(2)},${t.percentGain.toFixed(2)}%,${t.followed},${t.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'trading_journal.csv');
            a.click();
        }
    </script>
</body>
</html>
