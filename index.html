<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine 62</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; --shadow: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.9em; margin: 10px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); color: #e2e8f0; }
        .shadow-output { background: #161e2e; border-left: 4px solid var(--shadow); color: #fbbf24; }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .seq-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 6px; margin: 2px 0; background: #334155; color: #fff; border: 1px solid #475569; }
        .export-btn { margin-top: 20px; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Engine 62</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:60px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:60px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:60px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Updated Forensic CSV</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="15m High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="15m Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Calculations...</div>
                        <input type="number" placeholder="Shift % (e.g. 0.25)" id="sh-${i}" oninput="calc(${i})" value="0.25">
                        <div class="output shadow-output" id="sres-${i}">Shadow: Calculations...</div>
                        <div class="seq-row">
                            <input placeholder="E" id="s-e-${i}"><input placeholder="T1" id="s-t1-${i}"><input placeholder="T2" id="s-t2-${i}"><input placeholder="T3" id="s-t3-${i}"><input placeholder="S" id="s-s-${i}"><input placeholder="F" id="s-f-${i}">
                        </div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="IntraHigh" id="ih-${i}"><input type="number" placeholder="IntraLow" id="il-${i}"><input type="number" placeholder="Flatten" id="ex-${i}"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Actual P/L" id="pl-${i}"><input type="number" placeholder="Max Price" id="mp-${i}"></div>
                        <select id="exit-type-${i}"><option value="Normal">Normal</option><option value="BE">BE</option><option value="Stopped">Stopped</option></select>
                        <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const b = parseFloat(document.getElementById(`b-${i}`).value);
            const a = parseFloat(document.getElementById(`a-${i}`).value);
            const h = parseFloat(document.getElementById(`h-${i}`).value);
            const l = parseFloat(document.getElementById(`l-${i}`).value);
            const shift = parseFloat(document.getElementById(`sh-${i}`).value) || 0;
            const brokerage = document.getElementById(`m-${i}`).value;
            const r = parseFloat(document.getElementById('gRisk').value)/100;
            
            if(!b || !a || !h || !l) return;
            
            const e = h + (h * 0.001) + (a * 0.05);
            const sl = l - (a * 0.1);
            const stopDist = e - sl;
            
            // Standard Calculation
            const total = (brokerage === "ETRADE") ? Math.floor((b * r) / stopDist) : parseFloat(((b * r) / stopDist).toFixed(2));
            const sat = ((h - l) / a) * 100;
            const status = (sat >= parseFloat(document.getElementById('gMin').value) && sat <= parseFloat(document.getElementById('gMax').value)) ? "APPROVED" : "DISQUALIFIED";
            document.getElementById(`res-${i}`).innerHTML = `<b class="${status === 'APPROVED' ? 'approved' : 'disqualified'}">${status}</b> | E: ${e.toFixed(2)} | SL: ${sl.toFixed(2)}`;

            // Shadow Calculation
            const sE = e - (stopDist * shift);
            const sStopDist = sE - sl;
            const sTotal = (brokerage === "ETRADE") ? Math.floor((b * r) / sStopDist) : parseFloat(((b * r) / sStopDist).toFixed(2));
            document.getElementById(`sres-${i}`).innerHTML = `Shadow E: ${sE.toFixed(2)} | Shadow Vol: ${sTotal} ${brokerage === "MT5" ? "Lots" : "Shares"}`;
        }

        function exportCSV() {
            let csv = "Date,Status,Brokerage,Ticker,Balance,Risk%,ATR,15mHigh,15mLow,VolRatio%,Entry,SL,TP1,TP2,TP3,SeqE,SeqT1,SeqT2,SeqT3,SeqS,SeqF,IntraHigh,IntraLow,Flatten,MaxPrice,ActualPL,Efficiency%,GainLoss%,TradeNotes,ShadowEntry,ShadowVol\n";
            for(let i=0; i<8; i++) {
                const b = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const r = parseFloat(document.getElementById('gRisk').value)/100;
                const brokerage = document.getElementById(`m-${i}`).value;
                const shift = parseFloat(document.getElementById(`sh-${i}`).value) || 0;
                
                const e = h + (h * 0.001) + (a * 0.05);
                const sl = l - (a * 0.1);
                const stopDist = e - sl;
                const totalUnits = (brokerage === "ETRADE") ? Math.floor((b * r) / stopDist) : parseFloat(((b * r) / stopDist).toFixed(2));
                
                const sE = e - (stopDist * shift);
                const sStopDist = sE - sl;
                const sTotal = (brokerage === "ETRADE") ? Math.floor((b * r) / sStopDist) : parseFloat(((b * r) / sStopDist).toFixed(2));

                const sE_val = document.getElementById(`s-e-${i}`).value;
                const sT1 = document.getElementById(`s-t1-${i}`).value;
                const sT2 = document.getElementById(`s-t2-${i}`).value;
                const sT3 = document.getElementById(`s-t3-${i}`).value;
                const sS = document.getElementById(`s-s-${i}`).value;
                const sF = document.getElementById(`s-f-${i}`).value;
                const isBlank = (!sE_val && !sT1 && !sT2 && !sT3 && !sS && !sF);
                
                const ih = document.getElementById(`ih-${i}`).value || 0;
                const il = document.getElementById(`il-${i}`).value || 0;
                const pl = document.getElementById(`pl-${i}`).value || 0;
                const flatP = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const maxP = parseFloat(document.getElementById(`mp-${i}`).value) || 0;
                const status = ( ((h-l)/a)*100 >= parseFloat(document.getElementById('gMin').value) && ((h-l)/a)*100 <= parseFloat(document.getElementById('gMax').value) ) ? "APPROVED" : "DISQUALIFIED";
                
                const eff = (maxP > e && flatP > e) ? (((flatP - e) / (maxP - e)) * 100).toFixed(2) : "N/A";
                const gl = isBlank ? "0%" : (((flatP - e) * totalUnits) / b * 100).toFixed(2) + "%";

                csv += `${new Date().toLocaleDateString()},${status},${brokerage},${document.getElementById(`t-${i}`).value},${b},${(r*100).toFixed(2)}%,${a},${h},${l},${(((h-l)/a)*100).toFixed(2)}%,${e.toFixed(2)},${sl.toFixed(2)},${(e+stopDist).toFixed(2)},${(e+stopDist*2).toFixed(2)},${(e+stopDist*3).toFixed(2)},${sE_val},${sT1},${sT2},${sT3},${sS},${sF},${ih},${il},${flatP},${maxP},${pl},${eff}%,${gl},"${document.getElementById(`n1-${i}`).value}",${sE.toFixed(2)},${sTotal}\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Forensic_Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
