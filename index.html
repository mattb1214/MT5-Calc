<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Engine V33</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .output { font-family: monospace; font-size: 0.85em; margin: 15px 0; background: #020617; padding: 12px; border-left: 4px solid var(--accent); }
        .approved { color: #22c55e; font-weight: bold; }
        .disqualified { color: #ef4444; font-weight: bold; }
        .forensic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 8px; margin: 4px 0; background: #334155; color: #fff; border: 1px solid #475569; border-radius: 4px; }
        .export-btn { margin-top: 30px; padding: 18px; background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Strategy Engine V33</h2>
    <div class="dashboard">
        Risk%: <input type="number" id="gRisk" value="0.75" step="0.05" style="width:70px">
        Min Sat: <input type="number" id="gMin" value="32.5" style="width:70px">
        Max Sat: <input type="number" id="gMax" value="52.5" style="width:70px">
        SL Buff: <input type="number" id="gBuff" value="0.10" step="0.01" style="width:70px">
    </div>
    <div id="grid" class="grid"></div>
    <button class="export-btn" onclick="exportCSV()">Export Final Analytics Log</button>

    <script>
        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<8; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" placeholder="Ticker" id="t-${i}">
                        <select id="m-${i}" onchange="calc(${i})"><option value="MT5">MT5</option><option value="ETRADE">E*TRADE</option></select>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="Bal" id="b-${i}" oninput="calc(${i})"><input type="number" placeholder="ATR" id="a-${i}" oninput="calc(${i})"></div>
                        <div style="display:flex; gap:5px;"><input type="number" placeholder="High" id="h-${i}" oninput="calc(${i})"><input type="number" placeholder="Low" id="l-${i}" oninput="calc(${i})"></div>
                        <div class="output" id="res-${i}">Calculations...</div>
                        <div class="forensic-grid">
                            <input placeholder="Intra High" id="ih-${i}"><input placeholder="Intra Low" id="il-${i}"><input placeholder="Flatten P" id="ex-${i}">
                        </div>
                        <select id="exit-type-${i}"><option value="Normal">Normal</option><option value="BE">BE (Break Even)</option><option value="Stopped Out">Stopped Out</option></select>
                        <textarea placeholder="Trade Notes" id="n1-${i}"></textarea>
                    </div>
                `;
            }
        }

        function calc(i) {
            const bal = parseFloat(document.getElementById(`b-${i}`).value);
            const atr = parseFloat(document.getElementById(`a-${i}`).value);
            const high = parseFloat(document.getElementById(`h-${i}`).value);
            const low = parseFloat(document.getElementById(`l-${i}`).value);
            const risk = parseFloat(document.getElementById('gRisk').value) / 100;
            const minSat = parseFloat(document.getElementById('gMin').value);
            const maxSat = parseFloat(document.getElementById('gMax').value);
            const buff = parseFloat(document.getElementById('gBuff').value);
            if(!bal || !atr || !high || !low) return;

            const entry = high + ((high * 0.001) + (atr * 0.05 * buff));
            const sl = low - (atr * buff);
            const dist = entry - sl;
            const sat = ((high - low) / atr) * 100;
            const total = (bal * risk) / dist;
            const isMT5 = document.getElementById(`m-${i}`).value === 'MT5';
            const count = isMT5 ? total.toFixed(2) : Math.round(total);

            document.getElementById(`res-${i}`).innerHTML = `
                <b class="${sat >= minSat && sat <= maxSat ? 'approved' : 'disqualified'}">
                ${sat >= minSat && sat <= maxSat ? 'APPROVED' : 'DISQUALIFIED'} (${sat.toFixed(1)}%)</b><br>
                Total: ${count} | Body: ${isMT5 ? (count/3).toFixed(2) : Math.round(count/3)} | Runner: ${isMT5 ? (count*2/3).toFixed(2) : Math.round(count*2/3)}<br>
                E: ${entry.toFixed(2)} | SL: ${sl.toFixed(2)}<br>
                TP1: ${(entry+dist).toFixed(2)} | TP2: ${(entry+dist*2).toFixed(2)} | TP3: ${(entry+dist*3).toFixed(2)}
            `;
        }

        function exportCSV() {
            let csv = "Date,Ticker,Outcome,ExitType,GainLoss%,IntraHigh,IntraLow,TradeNotes\n";
            for(let i=0; i<8; i++) {
                const bal = parseFloat(document.getElementById(`b-${i}`).value) || 0;
                const h = parseFloat(document.getElementById(`h-${i}`).value) || 0;
                const l = parseFloat(document.getElementById(`l-${i}`).value) || 0;
                const a = parseFloat(document.getElementById(`a-${i}`).value) || 0;
                const risk = parseFloat(document.getElementById('gRisk').value) / 100;
                const buff = parseFloat(document.getElementById('gBuff').value);
                const entry = h + ((h * 0.001) + (a * 0.05 * buff));
                const sl = l - (a * buff);
                const tp1 = entry + (entry - sl);
                const flatPrice = parseFloat(document.getElementById(`ex-${i}`).value) || 0;
                const exitType = document.getElementById(`exit-type-${i}`).value;
                const ih = document.getElementById(`ih-${i}`).value;
                const il = document.getElementById(`il-${i}`).value;
                
                const totalShares = (bal * risk) / (entry - sl);
                let dollarPnL = (totalShares/3) * (tp1 - entry) + (totalShares*(2/3)) * (flatPrice - entry);

                const pct = bal > 0 ? ((dollarPnL / bal) * 100).toFixed(2) : 0;
                const outcome = flatPrice > entry ? "Win" : (flatPrice > 0 ? "Loss" : "No Trade");
                csv += `${new Date().toLocaleDateString()},${document.getElementById(`t-${i}`).value},${outcome},${exitType},${pct}%,${ih},${il},${document.getElementById(`n1-${i}`).value}\n`;
            }
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'Performance_Log.csv'; a.click();
        }
        window.onload = init;
    </script>
</body>
</html>
