<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Strategy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .run-btn { background: #f59e0b; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-size: 0.9em; }
        .approved { color: #4ade80; font-weight: bold; }
        .analysis-section { border-top: 2px solid #3b82f6; margin-top: 15px; padding-top: 15px; display: none; }
        .entry-btn { background: #475569; border: none; padding: 12px; width: 100%; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .entry-active { background: #10b981 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Engine</h2>
        <input type="text" id="ticker" placeholder="Ticker Symbol">
        <select id="brokerage">
            <option value="MT5">MT5</option>
            <option value="ETRADE">E*TRADE</option>
        </select>
        <input type="number" id="balance" placeholder="Start Balance ($)">
        <input type="number" id="risk" placeholder="Risk Level (%)">
        <input type="number" id="atr" placeholder="Daily ATR">
        <input type="number" id="high" placeholder="15m High">
        <input type="number" id="low" placeholder="15m Low">
        
        <button class="btn run-btn" onclick="runEngine()">Run Strategy Engine</button>
        
        <div id="output" class="result">Enter data and click Run Strategy...</div>

        <div id="analysisSection" class="analysis-section">
            <h3>Log Results</h3>
            <button id="entryBtn" class="entry-btn" onclick="toggleEntry()">Entry Price Hit</button>
            <input type="number" id="iHigh" placeholder="Intraday High">
            <input type="number" id="fPrice" placeholder="Flatten Price">
            <select id="followed"><option value="Y">Followed Strategy: Y</option><option value="N">Followed Strategy: N</option></select>
            <select id="status"><option value="W">Win</option><option value="L">Loss</option><option value="N">No Trade</option></select>
            <button class="btn" style="background:#f59e0b" onclick="logResults()">Update Trade Results</button>
        </div>
        
        <button class="btn" style="background:#10b981; margin-top:10px" onclick="downloadCSV()">Download Journal as CSV</button>
    </div>

    <script>
        let tradeLog = [];
        let currentTrade = null;
        let entryHit = false;

        function toggleEntry() {
            entryHit = !entryHit;
            document.getElementById('entryBtn').classList.toggle('entry-active');
        }

        function runEngine() {
            const ticker = document.getElementById('ticker').value;
            const bal = parseFloat(document.getElementById('balance').value);
            const risk = parseFloat(document.getElementById('risk').value);
            const high = parseFloat(document.getElementById('high').value);
            const low = parseFloat(document.getElementById('low').value);
            const atr = parseFloat(document.getElementById('atr').value);
            
            if(!ticker || !bal || !risk || !atr || !high || !low) {
                alert("Please fill in all fields.");
                return;
            }

            const mode = document.getElementById('brokerage').value;
            const entry = high + 0.02;
            const sl = low - (atr * 0.10);
            const stopDist = entry - sl;
            let total = (mode === 'MT5') ? (bal*(risk/100)/stopDist).toFixed(2) : Math.floor(bal*(risk/100)/stopDist);
            const body = (mode === 'MT5') ? (total * 0.33).toFixed(2) : Math.floor(total * 0.33);
            const runner = (mode === 'MT5') ? (total * 0.66).toFixed(2) : (total - body);

            currentTrade = { ticker, mode, bal, atr, high, low, entry, sl, 
                             tp1: entry + stopDist, tp2: entry + (stopDist * 2), tp3: entry + (stopDist * 3), 
                             total, body, runner };
            
            document.getElementById('output').innerHTML = `<span class="approved">APPROVED</span><br>
                Entry: ${entry.toFixed(2)} | Stop: ${sl.toFixed(2)}<br>
                TPs: ${currentTrade.tp1.toFixed(2)}, ${currentTrade.tp2.toFixed(2)}, ${currentTrade.tp3.toFixed(2)}<br>
                Total: ${total} (Body: ${body} | Runner: ${runner})<br>
                <button class="btn" onclick="captureTrade()">Capture Trade Plan</button>`;
        }

        function captureTrade() {
            tradeLog.push({ ...currentTrade, iHigh: '', fPrice: '', followed: '', status: '', actualPnL: 0, percentGain: 0 });
            alert("Plan captured!");
            document.getElementById('analysisSection').style.display = 'block';
        }

        function logResults() {
            let t = tradeLog[tradeLog.length - 1];
            t.iHigh = document.getElementById('iHigh').value;
            t.fPrice = document.getElementById('fPrice').value;
            t.followed = document.getElementById('followed').value;
            t.status = document.getElementById('status').value;
            t.actualPnL = entryHit ? (t.fPrice - t.entry) * t.total : 0;
            t.percentGain = entryHit ? (t.actualPnL / t.bal) * 100 : 0;
            alert("Results updated!");
        }

        function downloadCSV() {
            let csv = "Date,Ticker,Start Balance,Daily ATR,15m High,15m Low,Brokerage,Entry,SL,TP1,TP2,TP3,Total,Body,Runner,Intraday High,Flatten Price,Actual PnL,Percentage of Account,Strategy Followed,Strategy W/L/N\n";
            tradeLog.forEach(t => {
                csv += `${new Date().toLocaleDateString()},${t.ticker},${t.bal},${t.atr},${t.high},${t.low},${t.mode},${t.entry.toFixed(2)},${t.sl.toFixed(2)},${t.tp1.toFixed(2)},${t.tp2.toFixed(2)},${t.tp3.toFixed(2)},${t.total},${t.body},${t.runner},${t.iHigh},${t.fPrice},${t.actualPnL.toFixed(2)},${t.percentGain.toFixed(2)}%,${t.followed},${t.status}\n`;
            });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'trading_journal.csv';
            a.click();
        }
    </script>
</body>
</html>
